name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install JavaScript dependencies
        run: npm ci --no-audit --no-fund

      - name: Sync web files with Android
        run: npx cap sync android

      - name: Prepare optional release signing
        shell: bash
        run: |
          if [[ -n "$ANDROID_KEYSTORE_BASE64" && -n "$ANDROID_KEYSTORE_PASSWORD" && -n "$ANDROID_KEY_ALIAS" && -n "$ANDROID_KEY_PASSWORD" ]]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$GITHUB_WORKSPACE/android/app/release.keystore"
            echo "ANDROID_KEYSTORE_FILE=$GITHUB_WORKSPACE/android/app/release.keystore" >> "$GITHUB_ENV"
            echo "SIGNED_BUILD=true" >> "$GITHUB_ENV"
          else
            echo "SIGNED_BUILD=false" >> "$GITHUB_ENV"
          fi

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build signed release APK
        if: env.SIGNED_BUILD == 'true'
        working-directory: android
        run: ./gradlew assembleRelease --stacktrace

      - name: Build installable debug APK
        if: env.SIGNED_BUILD != 'true'
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Prepare APK files
        shell: bash
        run: |
          mkdir -p release
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "$SIGNED_BUILD" == "true" ]]; then
            SOURCE="android/app/build/outputs/apk/release/app-release.apk"
            OUTPUT="release/Samane-Samanha-${VERSION}-release.apk"
          else
            SOURCE="android/app/build/outputs/apk/debug/app-debug.apk"
            OUTPUT="release/Samane-Samanha-${VERSION}-debug.apk"
          fi
          cp "$SOURCE" "$OUTPUT"
          sha256sum "$OUTPUT" > "${OUTPUT}.sha256"
          echo "APK_FILE=$OUTPUT" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Samane-Samanha-Android
          path: |
            release/*.apk
            release/*.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Publish APK in GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release/*.apk release/*.sha256 --clobber
          else
            gh release create "$GITHUB_REF_NAME" release/*.apk release/*.sha256 --generate-notes --title "سامانه سمن‌ها $GITHUB_REF_NAME"
          fi
