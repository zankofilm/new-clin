    { const el = document.getElementById("dashboard-logs"); if (el) el.onclick = downloadLogs; }
    document.getElementById("download-logs").onclick = downloadLogs;
    document.getElementById("clear-logs").onclick = () => {
      state.logs = [];
      saveLogs();
      showToast("گزارش‌های ذخیره‌شده پاک شدند.", "success");
    };

    document.querySelectorAll("[data-action]").forEach(button => {
      button.addEventListener("click", () => {
        const action = button.dataset.action;
        if (action === "logout") {
          showDialog("خروج از سامانه", "خروج انجام شد. برای ورود مجدد، فایل اکتیو و مشخصات ورود را دوباره بررسی کنید.", "success");
          setTimeout(() => renderActivationScreen(), 450);
          return;
        }
        if (action === "finance") {
          renderFinanceAccess();
          return;
        }
        if (action === "expenses") {
          // کاربر قبلاً وارد اپ شده است؛ ورود به هزینه‌های جاری نیاز به کد ملی دوباره ندارد.
          state.expenses.verified = true;
          renderExpensesDashboard();
          return;
        }
        if (action === "account") {
          renderBankAccounts();
          return;
        }
        if (action === "board") {
          renderBoardMembers();
          return;
        }
        if (action === "org") {
          renderOrganizationRegistration();
          return;
        }
        if (action === "admin-export") {
          renderAdminExportPanel();
          return;
        }
        if (action === "settings") {
          renderSystemSettings();
          return;
        }
        if (action === "export-history") {
          renderExportHistory();
          return;
        }
        const label = button.querySelector(".menu-title").textContent.trim();
        showToast(`بخش «${label}» فعلاً برای مرحله بعدی آماده شده است.`, "warn");
      });
    });
  }

  async function downloadLogs() {
    const header = "گزارش خطا و رویدادهای سامانه سمن‌ها و NGOها\n";
    const content = header + "=".repeat(62) + "\n\n" + (state.logs.length
      ? state.logs.map((entry, index) =>
          `#${index + 1}\nزمان: ${entry.time}\nبخش: ${entry.context}\nپیام: ${entry.message}\nجزئیات: ${entry.stack || "-"}\n`
        ).join("\n" + "-".repeat(62) + "\n\n")
      : "تا این لحظه خطا یا رویدادی ثبت نشده است.\n");
    const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
    const fileName = `ngo-error-log-${new Date().toISOString().slice(0, 10)}.txt`;
    const nativeResult = await saveBlobWithNativeAndroid(blob, fileName);
    if (!nativeResult?.saved) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }
    showToast(nativeResult?.saved
      ? "فایل گزارش در پوشه Downloads/SamaneSamanha ذخیره شد."
      : "فایل گزارش آماده دانلود شد.", "success");
  }

  window.addEventListener("error", event => {
    logError(event.error || event.message || "خطای جاوااسکریپت", "خطای سراسری مرورگر");
    showDialog("خطا در برنامه", "یک خطای غیرمنتظره ثبت شد. از بخش «دانلود گزارش خطا» می‌توانید فایل گزارش را دریافت کنید.");
  });

  window.addEventListener("unhandledrejection", event => {
    logError(event.reason || "Promise rejection", "خطای پردازش غیرهمگام");
    showDialog("خطا در برنامه", "یک خطای غیرمنتظره ثبت شد. از بخش «دانلود گزارش خطا» می‌توانید فایل گزارش را دریافت کنید.");
  });

  startGovernmentHeaderObserver();
  bootstrapClient();
})();
    } catch (bootError) {
      console.error(bootError);
      document.getElementById("app").style.display = "none";
      document.getElementById("dialog-root").style.display = "none";
      const fallback = document.getElementById("boot-fallback");
      fallback.style.display = "block";
      document.getElementById("boot-fallback-message").textContent =
        "خطا هنگام راه‌اندازی: " + (bootError && bootError.message ? bootError.message : String(bootError));
    }
  </script>
</body>
</html>
