  async function confirmMonthlyFile(monthKey, bankAllocations = []) {
    const monthlyFile = await getMonthlyFile(monthKey);
    if (!monthlyFile) throw new Error("پرونده ماهانه پیدا نشد.");
    if (monthlyFile.status === "confirmed") return monthlyFile;

    const records = await getPaymentsForBatch(monthlyFile.batchId);
    if (!records.length) throw new Error("هیچ رکورد پرداختی برای این ماه پیدا نشد.");

    const db = await openFinanceDb();
    const confirmedAt = new Date().toISOString();
    try {
      const tx = db.transaction(["monthlyFiles", "batches", "payments", "beneficiaryLedger"], "readwrite");
      const monthlyStore = tx.objectStore("monthlyFiles");
      const batchStore = tx.objectStore("batches");
      const paymentStore = tx.objectStore("payments");
      const ledgerStore = tx.objectStore("beneficiaryLedger");

      const confirmedFile = {
        ...monthlyFile,
        status: "confirmed",
        confirmedAt,
        confirmedRecordCount: records.length,
        bankAllocations: bankAllocations.map(item => ({
          accountId: item.accountId,
          bankName: item.bankName,
          accountHolder: item.accountHolder,
          amount: Number(item.amount || 0)
        }))
      };
      monthlyStore.put(confirmedFile);

      batchStore.get(monthlyFile.batchId).onsuccess = event => {
        const batch = event.target.result;
        if (batch) batchStore.put({ ...batch, status: "confirmed", confirmedAt });
      };

      records.forEach(record => {
        const confirmedPayment = {
          ...record,
          status: "confirmed",
          confirmedAt,
          organizationFileName: monthlyFile.organizationFileName
        };
        paymentStore.put(confirmedPayment);

        // این همان «پرونده سمن» است که برای هر مددجو و همان ماه ثبت می‌شود.
        ledgerStore.put({
          ledgerId: `${monthlyFile.monthKey}:${record.nationalCode}`,
          monthKey: monthlyFile.monthKey,
          organizationId: monthlyFile.organizationId,
          organizationName: monthlyFile.organizationName,
          organizationFileName: monthlyFile.organizationFileName,
          jalaliYear: monthlyFile.jalaliYear,
          jalaliMonth: monthlyFile.jalaliMonth,
          monthLabel: monthlyFile.monthLabel,
          beneficiaryNationalCode: record.nationalCode,
          beneficiaryFullName: record.fullName,
          destinationType: record.destinationType,
          destination: record.destination,
          amountReceived: record.amount,
          paymentDateJalali: monthlyFile.paymentDateJalali,
          sourceBeneficiaryFile: monthlyFile.beneficiaryFileName,
          batchId: monthlyFile.batchId,
          bankAllocations: bankAllocations.map(item => ({
            accountId: item.accountId,
            bankName: item.bankName,
            accountHolder: item.accountHolder,
            amount: Number(item.amount || 0)
          })),
          confirmedAt
        });
      });

      await transactionDone(tx, "تأیید نهایی پرداخت‌ها انجام نشد.");
      return confirmedFile;
    } finally {
      db.close();
    }
  }

  async function rejectMonthlyFile(monthKey) {
    const monthlyFile = await getMonthlyFile(monthKey);
    if (!monthlyFile) throw new Error("پرونده ماهانه پیدا نشد.");
    if (monthlyFile.status === "confirmed") {
      throw new Error("این پرونده قبلاً تأیید شده است و از این صفحه قابل رد کردن نیست.");
    }

    const records = await getPaymentsForBatch(monthlyFile.batchId);
    const db = await openFinanceDb();
    try {
      const tx = db.transaction(["monthlyFiles", "batches", "payments"], "readwrite");
      tx.objectStore("monthlyFiles").delete(monthKey);
      tx.objectStore("batches").delete(monthlyFile.batchId);
      const payments = tx.objectStore("payments");
      records.forEach(record => payments.delete(record.recordId));
      await transactionDone(tx, "رد کردن پرونده و حذف داده موقت انجام نشد.");
    } finally {
      db.close();
    }
  }

  function isNationalCodeValid(value) {
    const code = latinDigits(value).replace(/\D/g, "");
    if (!/^\d{10}$/.test(code) || /^(\d)\1{9}$/.test(code)) return false;
    const check = Number(code[9]);
    const sum = code.slice(0, 9).split("").reduce((acc, digit, index) => acc + Number(digit) * (10 - index), 0) % 11;
    return check === (sum < 2 ? sum : 11 - sum);
  }

  function inferDestinationType(value, hinted) {
    const hint = normalizeText(hinted);
    if (hint.includes("کارت")) return "شماره کارت";
    if (hint.includes("حساب")) return "شماره حساب";
    const digits = latinDigits(value).replace(/\D/g, "");
    return digits.length === 16 ? "شماره کارت" : "شماره حساب";
  }

  function normalizeAmount(value) {
    const raw = latinDigits(value).replace(/[٬,،\sریال]/g, "").replace(/[^0-9.-]/g, "");
    const amount = Number(raw);
    return Number.isFinite(amount) && amount > 0 ? Math.round(amount) : 0;
  }

  function parseDelimited(text) {
    const lines = text.replace(/^\uFEFF/, "").split(/\r?\n/).filter(line => line.trim());
    if (!lines.length) return [];
    const candidates = [",", ";", "\t", "|"];
    const delimiter = candidates.map(d => ({ d, count: (lines[0].match(new RegExp(`\\${d}`, "g")) || []).length }))
      .sort((a, b) => b.count - a.count)[0].d;

    const parseLine = line => {
      const out = []; let cur = ""; let quoted = false;
      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') {
          if (quoted && line[i + 1] === '"') { cur += '"'; i++; }
          else quoted = !quoted;
        } else if (char === delimiter && !quoted) {
          out.push(cur.trim()); cur = "";
        } else cur += char;
      }
      out.push(cur.trim());
      return out;
    };
    return lines.map(parseLine);
  }

  function readU16(view, offset) { return view.getUint16(offset, true); }
  function readU32(view, offset) { return view.getUint32(offset, true); }

  async function unzipXlsx(arrayBuffer) {
    const view = new DataView(arrayBuffer);
    let eocd = -1;
    for (let i = view.byteLength - 22; i >= Math.max(0, view.byteLength - 65557); i--) {
      if (readU32(view, i) === 0x06054b50) { eocd = i; break; }
    }
    if (eocd < 0) throw new Error("فایل اکسل قابل بازخوانی نیست.");

    const centralOffset = readU32(view, eocd + 16);
    const entries = new Map();
    let offset = centralOffset;
    const decoder = new TextDecoder("utf-8");

    while (offset + 46 <= view.byteLength && readU32(view, offset) === 0x02014b50) {
      const method = readU16(view, offset + 10);
      const compressedSize = readU32(view, offset + 20);
      const nameLen = readU16(view, offset + 28);
      const extraLen = readU16(view, offset + 30);
      const commentLen = readU16(view, offset + 32);
      const localOffset = readU32(view, offset + 42);
      const name = decoder.decode(new Uint8Array(arrayBuffer, offset + 46, nameLen));
      entries.set(name, { method, compressedSize, localOffset });
      offset += 46 + nameLen + extraLen + commentLen;
    }

    async function entryText(name) {
      const entry = entries.get(name);
      if (!entry) return null;
      const local = entry.localOffset;
      if (readU32(view, local) !== 0x04034b50) throw new Error("ساختار فایل اکسل نامعتبر است.");
      const nameLen = readU16(view, local + 26);
      const extraLen = readU16(view, local + 28);
      const start = local + 30 + nameLen + extraLen;
      const compressed = new Uint8Array(arrayBuffer.slice(start, start + entry.compressedSize));
      let bytes;
      if (entry.method === 0) bytes = compressed;
      else if (entry.method === 8 && typeof DecompressionStream !== "undefined") {
        const stream = new Blob([compressed]).stream().pipeThrough(new DecompressionStream("deflate-raw"));
        bytes = new Uint8Array(await new Response(stream).arrayBuffer());
      } else {
        throw new Error("مرورگر امکان بازخوانی XLSX را ندارد. Chrome را به‌روز کنید یا فایل CSV را وارد کنید.");
      }
      return decoder.decode(bytes);
    }

    return { entryText };
  }

  function xmlDocument(text) {
    const doc = new DOMParser().parseFromString(text, "application/xml");
    if (doc.querySelector("parsererror")) throw new Error("ساختار داخلی فایل اکسل قابل خواندن نیست.");
    return doc;
  }

  function attrByLocalName(node, localName) {
    for (const attr of Array.from(node.attributes || [])) {
      if (attr.localName === localName || attr.name === localName) return attr.value;
    }
    return null;
  }

  function columnIndex(ref) {
    const letters = String(ref || "").replace(/\d/g, "");
    return letters.split("").reduce((n, char) => n * 26 + (char.charCodeAt(0) - 64), 0) - 1;
  }

  async function parseXlsx(arrayBuffer) {
    const zip = await unzipXlsx(arrayBuffer);
    const workbookText = await zip.entryText("xl/workbook.xml");
    const relsText = await zip.entryText("xl/_rels/workbook.xml.rels");
    if (!workbookText || !relsText) throw new Error("شیت‌های فایل اکسل پیدا نشدند.");

    const workbook = xmlDocument(workbookText);
    const relations = xmlDocument(relsText);
    const sheets = Array.from(workbook.getElementsByTagNameNS("*", "sheet"));
    const targetSheet = sheets.find(s => normalizeText(s.getAttribute("name")).includes("پرداخت")) || sheets[0];
    if (!targetSheet) throw new Error("هیچ شیتی در فایل اکسل وجود ندارد.");

    const relId = attrByLocalName(targetSheet, "id");
    const relationship = Array.from(relations.getElementsByTagNameNS("*", "Relationship"))
      .find(r => r.getAttribute("Id") === relId);

    let target = relationship?.getAttribute("Target") || "worksheets/sheet1.xml";
    target = String(target).replace(/^\/+/, "");
    if (!target.startsWith("xl/")) target = `xl/${target}`;

    let sheetText = await zip.entryText(target);
    if (!sheetText && target.startsWith("xl/xl/")) sheetText = await zip.entryText(target.slice(3));
    if (!sheetText && target.startsWith("xl/worksheets/")) sheetText = await zip.entryText(`/${target}`);
    if (!sheetText) throw new Error(`شیت پرداختی‌ها در فایل اکسل خوانده نشد. مسیر شیت: ${target}`);

    const sharedText = await zip.entryText("xl/sharedStrings.xml");
    const shared = sharedText
      ? Array.from(xmlDocument(sharedText).getElementsByTagNameNS("*", "si")).map(si => si.textContent || "")
      : [];

    const doc = xmlDocument(sheetText);
    const xmlRows = Array.from(doc.getElementsByTagNameNS("*", "row"));
    return xmlRows.map(row => {
      const output = [];
      Array.from(row.getElementsByTagNameNS("*", "c")).forEach(cell => {
        const idx = columnIndex(cell.getAttribute("r"));
        const type = cell.getAttribute("t");
        const v = cell.getElementsByTagNameNS("*", "v")[0]?.textContent || "";
        let value = v;
        if (type === "s") value = shared[Number(v)] ?? "";
        else if (type === "inlineStr") value = cell.getElementsByTagNameNS("*", "t")[0]?.textContent || "";
        output[idx] = value;
      });
      return output;
    }).filter(row => row.some(v => String(v ?? "").trim()));
  }

  function mapColumns(headers) {
    const normalized = headers.map(normalizeText);
    const indexFor = (...keys) => normalized.findIndex(header => keys.some(key => header.includes(normalizeText(key))));
    return {
      firstName: indexFor("نام", "نام گیرنده", "first name"),
      lastName: indexFor("نام خانوادگی", "نام خانوادگي", "last name"),
      nationalCode: indexFor("کد ملی", "کدملی", "national code"),
      destinationType: indexFor("نوع مقصد", "نوع حساب", "نوع کارت"),
      destination: indexFor("شماره حساب یا شماره کارت", "شماره کارت", "شماره حساب", "حساب/کارت", "destination"),
      amount: indexFor("مبلغ واریزی", "مبلغ پرداخت", "مبلغ", "amount"),
      tracking: indexFor("شماره پیگیری", "کد پیگیری", "tracking"),
      date: indexFor("تاریخ پرداخت", "تاریخ", "date")
    };
  }

  function analyzeRows(rows) {
    if (!rows || rows.length < 2) {
      throw new Error("فایل حداقل باید شامل یک ردیف عنوان و یک ردیف مددجو باشد.");
    }

    const headers = rows[0].map(v => String(v ?? "").trim());
    const map = mapColumns(headers);
    const required = ["firstName", "lastName", "nationalCode", "destination", "amount"];
    const missing = required.filter(key => map[key] < 0);

    if (missing.length) {
      const labels = {
        firstName: "نام",
        lastName: "نام خانوادگی",
        nationalCode: "کد ملی",
        destination: "شماره حساب/کارت",
        amount: "مبلغ واریزی"
      };
      throw new Error(`ستون‌های ضروری پیدا نشدند: ${missing.map(k => labels[k]).join("، ")}`);
    }

    const records = [], invalid = [], seen = new Set();
    rows.slice(1).forEach((row, index) => {
      const rowNumber = index + 2;
      const firstName = String(row[map.firstName] ?? "").trim();
      const lastName = String(row[map.lastName] ?? "").trim();
      const nationalCode = latinDigits(row[map.nationalCode] ?? "").replace(/\D/g, "");
      const destinationRaw = latinDigits(row[map.destination] ?? "").replace(/\D/g, "");
      const amount = normalizeAmount(row[map.amount]);
      const reasons = [];

      if (!firstName) reasons.push("نام خالی است");
      if (!lastName) reasons.push("نام خانوادگی خالی است");
      if (!isNationalCodeValid(nationalCode)) reasons.push("کد ملی نامعتبر است");
      if (destinationRaw.length < 10) reasons.push("شماره حساب/کارت نامعتبر است");
      if (!amount) reasons.push("مبلغ واریزی نامعتبر است");
      if (seen.has(nationalCode)) reasons.push("کد ملی تکراری در همین فایل");

      if (reasons.length) {
        invalid.push({
          rowNumber,
          firstName,
          lastName,
          nationalCode,
          destination: destinationRaw,
          amount,
          reason: reasons.join("، ")
        });
      } else {
        seen.add(nationalCode);
        records.push({
          rowNumber,
          firstName,
          lastName,
          nationalCode,
          destinationType: inferDestinationType(destinationRaw, row[map.destinationType]),
          destination: destinationRaw,
          amount,
          trackingNumber: map.tracking >= 0 ? String(row[map.tracking] ?? "").trim() : "",
          sourceDate: map.date >= 0 ? String(row[map.date] ?? "").trim() : ""
        });
      }
    });

    return {
      headers,
      records,
      invalid,
      totalAmount: records.reduce((sum, record) => sum + record.amount, 0)
    };
  }

  async function hashArrayBuffer(buffer) {
    try {
      const digest = await crypto.subtle.digest("SHA-256", buffer);
      return Array.from(new Uint8Array(digest)).map(v => v.toString(16).padStart(2, "0")).join("");
    } catch (_) {
      const bytes = new Uint8Array(buffer);
      let hash = 5381;
      for (const byte of bytes) hash = ((hash << 5) + hash) ^ byte;
      return `fallback-${(hash >>> 0).toString(16)}-${bytes.length}`;
    }
  }

  async function parseFinanceFile(file) {
    const fileName = file.name || "فایل مددجوها";
    const lower = fileName.toLowerCase();
    const buffer = await file.arrayBuffer();
    let rows;

    if (lower.endsWith(".xlsx")) rows = await parseXlsx(buffer);
    else if (lower.endsWith(".csv") || lower.endsWith(".txt")) {
      rows = parseDelimited(new TextDecoder("utf-8").decode(buffer));
    } else {
      throw new Error("فعلاً فقط فایل‌های XLSX، CSV و TXT پشتیبانی می‌شوند.");
    }

    return {
      ...analyzeRows(rows),
      fileName,
      fileHash: await hashArrayBuffer(buffer)
    };
  }

  function sanitizeExportData(value) {
    const sensitiveKeys = new Set([
      "passwordHash", "passwordSalt", "username", "userId", "activationId",
      "signature", "compatibleClient", "issuedBy", "active", "activationRev"
    ]);

    const walk = item => {
      if (item === null || item === undefined) return item;
      if (item instanceof Blob || item instanceof ArrayBuffer || ArrayBuffer.isView(item)) return undefined;
      if (Array.isArray(item)) return item.map(walk).filter(item => item !== undefined);
      if (typeof item === "object") {
        const output = {};
        Object.entries(item).forEach(([key, nested]) => {
          if (sensitiveKeys.has(key)) return;
          const clean = walk(nested);
          if (clean !== undefined) output[key] = clean;
        });
        return output;
      }
      return item;
    };
    return walk(value);
  }

  function fileNameSafe(value, fallback = "file") {
    const clean = String(value || fallback)
      .replace(/[\\/:*?"<>|]+/g, "_")
      .replace(/\s+/g, "_")
      .replace(/^_+|_+$/g, "");
    return clean || fallback;
  }

  function fileExtensionFromMime(mime = "") {
    const map = {
      "image/jpeg": "jpg", "image/png": "png", "image/webp": "webp",
      "application/pdf": "pdf", "image/heic": "heic", "image/heif": "heif"
    };
    return map[String(mime).toLowerCase()] || "bin";
  }

  function dataUrlToBytes(dataUrl) {
    const raw = String(dataUrl || "");
    const comma = raw.indexOf(",");
    if (comma < 0) return null;
    const base64 = raw.slice(comma + 1);
    try {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    } catch (_) {
      return null;
    }
  }

  async function attachmentBytes(attachment) {
    const candidate = attachment?.blob || attachment?.fileBlob || attachment?.dataBlob || attachment?.file;
    if (candidate instanceof Blob) {
      return new Uint8Array(await candidate.arrayBuffer());
    }
    if (candidate instanceof ArrayBuffer) return new Uint8Array(candidate);
    if (ArrayBuffer.isView(candidate)) return new Uint8Array(candidate.buffer);
    if (attachment?.dataUrl) return dataUrlToBytes(attachment.dataUrl);
    if (attachment?.base64) {
      try {
        const binary = atob(String(attachment.base64));
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        return bytes;
      } catch (_) {
        return null;
      }
    }
    return null;
  }

  async function collectAttachmentExportFiles(attachments) {
    const files = [];
    const metadata = [];

    for (let index = 0; index < attachments.length; index++) {
      const attachment = attachments[index];
      const bytes = await attachmentBytes(attachment);
      const fallback = `attachment_${index + 1}.${fileExtensionFromMime(attachment?.mimeType || attachment?.type || "")}`;
      const originalName = attachment?.fileName || attachment?.name || fallback;
      const folder = attachment?.entityType === "activity" ? "activities/attachments" : "documents/attachments";
      const safeName = `${fileNameSafe(attachment?.attachmentId || `attachment_${index + 1}`)}_${fileNameSafe(originalName, fallback)}`;
      const path = `${folder}/${safeName}`;

      delete clean.dataUrl;
      delete clean.base64;
      delete clean.blob;
      delete clean.fileBlob;
      delete clean.dataBlob;
      delete clean.file;

      metadata.push({
        ...clean,
        exportedPath: bytes ? path : null,
        exportedBinary: Boolean(bytes)
      });

      if (bytes) files.push({ path, data: bytes });
    }
    return { files, metadata };
  }

  function crc32(bytes) {
    if (!crc32.table) {
      crc32.table = Array.from({ length: 256 }, (_, n) => {
        let c = n;
        for (let k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
        return c >>> 0;
      });
    }
    let crc = 0xFFFFFFFF;
    for (let i = 0; i < bytes.length; i++) crc = crc32.table[(crc ^ bytes[i]) & 0xFF] ^ (crc >>> 8);
    return (crc ^ 0xFFFFFFFF) >>> 0;
  }

  function zipU16(value) {
    const out = new Uint8Array(2);
    new DataView(out.buffer).setUint16(0, value & 0xFFFF, true);
    return out;
  }

  function zipU32(value) {
    const out = new Uint8Array(4);
    new DataView(out.buffer).setUint32(0, value >>> 0, true);
    return out;
  }

  function zipConcat(chunks) {
    const size = chunks.reduce((sum, chunk) => sum + chunk.length, 0);
    const output = new Uint8Array(size);
    let offset = 0;
    chunks.forEach(chunk => {
      output.set(chunk, offset);
      offset += chunk.length;
    });
    return output;
  }

  function zipDosTime(date) {
    return ((date.getHours() << 11) | (date.getMinutes() << 5) | Math.floor(date.getSeconds() / 2)) & 0xFFFF;
  }

  function zipDosDate(date) {
    return (((date.getFullYear() - 1980) << 9) | ((date.getMonth() + 1) << 5) | date.getDate()) & 0xFFFF;
  }

  function buildStoredZip(files) {
    const now = new Date();
    const time = zipDosTime(now);
    const date = zipDosDate(now);
    const encoder = new TextEncoder();
    const localChunks = [];
    const centralChunks = [];
    let offset = 0;

    files.forEach(file => {
      const nameBytes = encoder.encode(file.path);
      const data = file.data instanceof Uint8Array ? file.data : new Uint8Array(file.data);
      const checksum = crc32(data);
      const flags = 0x0800; // UTF-8
      const local = zipConcat([
        zipU32(0x04034B50), zipU16(20), zipU16(flags), zipU16(0),
        zipU16(time), zipU16(date), zipU32(checksum), zipU32(data.length), zipU32(data.length),
        zipU16(nameBytes.length), zipU16(0), nameBytes, data
      ]);
      localChunks.push(local);

      const central = zipConcat([
        zipU32(0x02014B50), zipU16(20), zipU16(20), zipU16(flags), zipU16(0),
        zipU16(time), zipU16(date), zipU32(checksum), zipU32(data.length), zipU32(data.length),
        zipU16(nameBytes.length), zipU16(0), zipU16(0), zipU16(0), zipU16(0), zipU32(0),
        zipU32(offset), nameBytes
      ]);
      centralChunks.push(central);
      offset += local.length;
    });

    const localData = zipConcat(localChunks);
    const centralData = zipConcat(centralChunks);
    const end = zipConcat([
      zipU32(0x06054B50), zipU16(0), zipU16(0), zipU16(files.length), zipU16(files.length),
      zipU32(centralData.length), zipU32(localData.length), zipU16(0)
    ]);
    return new Blob([zipConcat([localData, centralData, end])], { type: "application/zip" });
  }

  async function blobToBase64(blob) {
    const bytes = new Uint8Array(await blob.arrayBuffer());
    let binary = "";
    const chunkSize = 0x8000;
    for (let offset = 0; offset < bytes.length; offset += chunkSize) {
      binary += String.fromCharCode(...bytes.subarray(offset, offset + chunkSize));
    }
    return btoa(binary);
  }

  async function saveBlobWithNativeAndroid(blob, fileName) {
    if (!globalThis.Capacitor?.isNativePlatform?.()) return null;
    const fileSaver = getNativeCapacitorPlugin("FileSaver");
    if (!fileSaver) return null;

    let token = "";
    try {
      const started = await fileSaver.beginFile({
        fileName,
        mimeType: blob.type || "application/octet-stream"
      });
      token = started?.token || "";
      if (!token) throw new Error("نشست ذخیره فایل ایجاد نشد.");

      const chunkSize = 192 * 1024;
      for (let offset = 0; offset < blob.size; offset += chunkSize) {
        const chunk = blob.slice(offset, Math.min(offset + chunkSize, blob.size));
        await fileSaver.appendFileChunk({ token, base64: await blobToBase64(chunk) });
      }

      return await fileSaver.finishFile({ token });
    } catch (error) {
      if (token) {
        try { await fileSaver.abortFile({ token }); } catch (_) {}
      }
      logError(error, "ذخیره فایل در اندروید");
      throw new Error(error?.message || "ذخیره فایل در حافظه دستگاه انجام نشد.");
    }
  }

  async function downloadExportBlob(blob, fileName) {
    const nativeResult = await saveBlobWithNativeAndroid(blob, fileName);
    if (nativeResult?.saved) return nativeResult;

    const url = URL.createObjectURL(blob);

    link.href = url;
    link.download = fileName;
    document.body.appendChild(link);
    link.click();
    link.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1500);
    return null;
  }

        // کاربر پنجره انتخاب مسیر را بسته است؛ هیچ دانلودی شروع نشود.

  function revisionRecordMap(records, idBuilder) {

  function buildRevisionChangeSummary(previousSnapshot, nextSnapshot) {
    if (!previousSnapshot) {
      return {
        kind: "INITIAL",
        text: "گزارش اولیه برای این محدوده مالی است.",
        beneficiaries: { added: (nextSnapshot.beneficiaries || []).length, removed: 0, changed: 0 },
        expenses: { added: (nextSnapshot.expenses || []).length, removed: 0, changed: 0 },
        accountingFieldsChanged: []
      };
    }

    const countChanges = (oldRows, newRows, idBuilder) => {
      const oldMap = revisionRecordMap(oldRows, idBuilder);
      const newMap = revisionRecordMap(newRows, idBuilder);
      let added = 0, removed = 0, changed = 0;
      for (const [id, value] of newMap) {
        if (!oldMap.has(id)) added += 1;
        else if (stableStringify(oldMap.get(id)) !== stableStringify(value)) changed += 1;
      }
      for (const id of oldMap.keys()) {
        if (!newMap.has(id)) removed += 1;
      }
      return { added, removed, changed };
    };

    const beneficiaryChanges = countChanges(
      previousSnapshot.beneficiaries || [],
      nextSnapshot.beneficiaries || [],
      item => `${item.nationalCode}|${item.trackingNumber || item.destination || ""}`
    );
    const expenseChanges = countChanges(
      previousSnapshot.expenses || [],
      nextSnapshot.expenses || [],
      item => item.expenseId || `${item.expenseDateJalali}|${item.category}|${item.referenceNumber}|${item.amount}`
    );
    const previousAccounting = previousSnapshot.accounting || {};
    const nextAccounting = nextSnapshot.accounting || {};
    const accountingFieldsChanged = Object.keys(nextAccounting).filter(key =>
      stableStringify(previousAccounting[key] ?? "") !== stableStringify(nextAccounting[key] ?? "")
    );

    const totalChanges =
      beneficiaryChanges.added + beneficiaryChanges.removed + beneficiaryChanges.changed +
      expenseChanges.added + expenseChanges.removed + expenseChanges.changed +
      accountingFieldsChanged.length;

    return {
      kind: totalChanges ? "CORRECTION" : "UNCHANGED",
      text: totalChanges
        ? `${beneficiaryChanges.added + beneficiaryChanges.removed + beneficiaryChanges.changed} تغییر مددجو، ${expenseChanges.added + expenseChanges.removed + expenseChanges.changed} تغییر هزینه و ${accountingFieldsChanged.length} تغییر مالی شناسایی شد.`
        : "هیچ تغییری نسبت به آخرین خروجی ثبت‌شده یافت نشد.",
      beneficiaries: beneficiaryChanges,
      expenses: expenseChanges,
      accountingFieldsChanged
    };
  }

      };
      const scopeKey = `${accounting.organizationId}:MONTH:${accounting.monthId}`;
      const contentHash = await sha256(stableStringify(revisionSnapshot));

      monthIndex.push({
        monthId: accounting.monthId,
        monthLabel: accounting.monthLabel,
        jalaliYear: accounting.jalaliYear,
        jalaliMonth: accounting.jalaliMonth,
        financialPath: `${folder}/financial-summary.json`,
        beneficiariesPath: `${folder}/beneficiaries.json`,
        expensesPath: `${folder}/expenses.json`,
        beneficiaryCount: payments.length,
        beneficiaryPaymentTotal: Number(accounting.beneficiaryPayments || 0),

        balance: Number(accounting.balance || 0),
        carryForward: Number(accounting.carryForward || 0),
        deficit: Number(accounting.deficit || 0),
        scopeKey
      });

      revisionScopes.push({
        scopeKey,
        scopeType: "MONTH",
        monthId: accounting.monthId,
        monthLabel: accounting.monthLabel,
        contentHash,
        snapshot: revisionSnapshot
      });
    }

    return { files, monthIndex, revisionScopes };
  }

  async function getLatestScopeExportHistory(scopeKey) {
    const organizationId = currentOrganizationId();
    const records = await getExportStoreRows("exportHistory", "organizationId", organizationId);
    const entries = [];
    (records || []).forEach(history => {
      (history.scopeEntries || []).forEach(scope => {
        if (scope.scopeKey === scopeKey) {
          entries.push({
            ...scope,
            packageId: history.packageId,
            createdAt: history.createdAt,
            historyId: history.historyId
          });
        }
      });
    });
    return entries.sort((a, b) =>
      Number(b.revision || 0) - Number(a.revision || 0) ||
      String(b.createdAt || "").localeCompare(String(a.createdAt || ""))
    )[0] || null;
  }

  async function buildRevisionEntries(scopeSeeds, correctionReason = "") {
    const result = [];
    for (const scope of scopeSeeds) {
      const previous = await getLatestScopeExportHistory(scope.scopeKey);
      const unchanged = Boolean(previous && previous.contentHash === scope.contentHash);
      const revision = previous ? (unchanged ? Number(previous.revision || 1) : Number(previous.revision || 1) + 1) : 1;
      const changeSummary = buildRevisionChangeSummary(previous?.snapshot || null, scope.snapshot);
      result.push({
        ...scope,
        revision,
        relation: !previous ? "INITIAL" : (unchanged ? "UNCHANGED" : "CORRECTION"),
        parentPackageId: previous?.packageId || null,
        previousContentHash: previous?.contentHash || null,
        correctionReason: !previous || unchanged ? "" : correctionReason,
        changeSummary
      });
    }
    return result;
  }

  function formatRevisionSummary(scopeEntries) {
    const initial = scopeEntries.filter(item => item.relation === "INITIAL").length;
    const corrections = scopeEntries.filter(item => item.relation === "CORRECTION").length;
    const unchanged = scopeEntries.filter(item => item.relation === "UNCHANGED").length;
    const labels = [];
    if (initial) labels.push(`${persianDigits(initial)} گزارش اولیه`);
    if (corrections) labels.push(`${persianDigits(corrections)} اصلاحیه`);
    if (unchanged) labels.push(`${persianDigits(unchanged)} بدون تغییر`);
    return labels.join(" · ") || "بدون ماه مالی";
  }

  async function sha256BlobHex(blob) {
    if (!globalThis.crypto?.subtle) return "";
    const bytes = await blob.arrayBuffer();
    const digest = await crypto.subtle.digest("SHA-256", bytes);
    return Array.from(new Uint8Array(digest)).map(value => value.toString(16).padStart(2, "0")).join("");
  }

  function packageLabel(type, organizationName) {
    const prefix = {
      FULL_SYSTEM: "خروجی-کل-سیستم",
      MONTHLY: "خروجی-ماهانه",
      YEARLY: "خروجی-سالیانه",
      SELECTED_MONTHS: "خروجی-ماه‌های-انتخابی"
    }[type] || "خروجی-پنل-ادمین";
    const dateStamp = exportJalaliDateStamp();
    return fileNameSafe([organizationName, prefix, dateStamp].filter(Boolean).join("_"), "admin_export") + ".zip";

  async function createAdminExportPackage(type, accountingRows, options = {}) {
    const payload = state.license?.payload;
    if (!payload?.orgId) throw new Error("شناسه سمن برای ایجاد خروجی در دسترس نیست.");

    const allFiles = [];
    const organizationRef = exportOrganizationRef();
    const selectedRows = [...accountingRows].sort((a, b) => String(a.monthId || "").localeCompare(String(b.monthId || "")));
    const { files: financialFiles, monthIndex, revisionScopes } = await buildFinancialExportFiles(selectedRows);
    allFiles.push(...financialFiles);

    let baseCounts = {
      boardMembers: 0,
      bankAccounts: 0,
      documents: 0,
      activities: 0,
      attachments: 0
    };

    if (type === "FULL_SYSTEM") {
      const [
        organizationProfile,
        boardMembers,
        bankAccounts,
        documents,
        activities,
        attachments
      ] = await Promise.all([
        getExportOrganizationProfile(),
        getExportStoreRows("boardMembers", "organizationId", payload.orgId),
        getExportStoreRows("bankAccounts", "organizationId", payload.orgId),
        getExportStoreRows("documents", "organizationId", payload.orgId),
        getExportStoreRows("activities", "organizationId", payload.orgId),
        getExportStoreRows("attachments", "organizationId", payload.orgId)
      ]);

      const attachmentExport = await collectAttachmentExportFiles(attachments || []);
      baseCounts = {
        boardMembers: (boardMembers || []).length,
        bankAccounts: (bankAccounts || []).length,
        documents: (documents || []).length,
        activities: (activities || []).length,
        attachments: (attachments || []).length
      };

      allFiles.unshift(
        exportJsonFile("organization/organization.json", {
          organization: organizationRef,
          profile: organizationProfile || null,
          exportNote: "فایل اکتیو، اطلاعات ورود و داده‌های احراز هویت در این پکیج قرار ندارند."
        }),
        exportJsonFile("governance/board-members.json", { boardMembers }),
        exportJsonFile("finance/bank-accounts.json", { bankAccounts }),
        exportJsonFile("documents/documents.json", { documents }),
        exportJsonFile("activities/activities.json", { activities }),
        exportJsonFile("attachments/attachments.json", { attachments: attachmentExport.metadata })
      );
      allFiles.push(...attachmentExport.files);

      const baseSnapshot = {
        organization: organizationRef,
        profile: sanitizeExportData(organizationProfile || null),
        counts: baseCounts
      };
      revisionScopes.push({
        scopeKey: `${payload.orgId}:BASE`,
        scopeType: "BASE",
        monthId: null,
        monthLabel: "اطلاعات پایه سمن",
        contentHash: await sha256(stableStringify(baseSnapshot)),
        snapshot: baseSnapshot
      });
    }

    const correctionReason = String(options.correctionReason || "").trim();
    const scopeEntries = await buildRevisionEntries(revisionScopes, correctionReason);
    const hasCorrections = scopeEntries.some(item => item.relation === "CORRECTION");
    const noChanges = scopeEntries.length > 0 && scopeEntries.every(item => item.relation === "UNCHANGED");

    if (hasCorrections && !correctionReason) {
      const months = scopeEntries.filter(item => item.relation === "CORRECTION").map(item => item.monthLabel).filter(Boolean).join("، ");
      throw new Error(`برای اصلاحیه ${months || "این پکیج"}، علت اصلاح را وارد کنید.`);
    }

    const fileRows = allFiles.map(file => ({
      path: file.path,
      bytes: file.data.length,
      crc32: crc32(file.data).toString(16).padStart(8, "0")
    }));
    const packageContentHash = await sha256(stableStringify(fileRows));

    const manifest = {
      format: ADMIN_EXPORT_FORMAT,
      protocolVersion: 2,
      packageId: `ADMIN-${Date.now()}-${Math.random().toString(36).slice(2, 8).toUpperCase()}`,
      packageType: type,
      createdAt: new Date().toISOString(),
      organization: organizationRef,
      range: {
        selectedMonthIds: monthIndex.map(item => item.monthId),
        selectedMonthLabels: monthIndex.map(item => item.monthLabel),
        jalaliYear: options.jalaliYear || null
      },
      content: {
        financialMonths: monthIndex.length,
        beneficiaries: monthIndex.reduce((sum, item) => sum + Number(item.beneficiaryCount || 0), 0),
        baseDataIncluded: type === "FULL_SYSTEM",
        ...baseCounts
      },
      revision: {
        protocol: ADMIN_EXPORT_REVISION_PROTOCOL,
        exportMode: "FULL_SNAPSHOT",
        correctionReason: hasCorrections ? correctionReason : "",
        summary: formatRevisionSummary(scopeEntries),
        scopes: scopeEntries
      },
      integrity: {
        algorithm: "CRC32+SHA256",
        contentHash: packageContentHash,
        files: fileRows,
        manifestExcludesItself: true
      },
      importRules: {
        organizationLookup: ["organizationId", "organizationNationalId", "registrationNumber"],
        activationFileIncluded: false,
        fullSnapshotRequiredForCorrections: true,
        monthlyPackagesContainOnlyFinanceAndBeneficiaries: type !== "FULL_SYSTEM"
      }
    };

    allFiles.unshift(exportJsonFile("manifest.json", manifest));
    const zipBlob = buildStoredZip(allFiles);
    const archiveHash = await sha256BlobHex(zipBlob);
    const fileName = options.fileName || packageLabel(type, payload.organizationName);

    return {
      blob: zipBlob,
      fileName,
      manifest,
      monthIndex,
      scopeEntries,
      hasCorrections,
      noChanges,
      archiveHash
    };
  }

  async function inspectAdminExportContents(type, accountingRows) {
    const payload = state.license?.payload || {};
    const rows = [...(accountingRows || [])].sort((a, b) => String(a.monthId || "").localeCompare(String(b.monthId || "")));
    let beneficiaries = 0;
    let expenses = 0;

    for (const item of rows) {
      const monthlyFile = await getMonthlyFile(item.monthKey);
      const payments = monthlyFile?.batchId ? await getPaymentsForBatch(monthlyFile.batchId) : [];
      const expenseInfo = await getCurrentExpensesForMonth(
        item.organizationId,
        item.jalaliYear,
        item.jalaliMonth
      );
      beneficiaries += payments.length;
      expenses += Number(expenseInfo.count || 0);
    }

    const data = {
      organization: payload.organizationName || "سمن",
      months: rows.length,
      beneficiaries,
      expenses,
      boardMembers: 0,
      bankAccounts: 0,
      documents: 0,
      activities: 0,
      attachments: 0
    };

    if (type === "FULL_SYSTEM") {
      const [
        boardMembers,
        bankAccounts,
        documents,
        activities,
        attachments
      ] = await Promise.all([
        getExportStoreRows("boardMembers", "organizationId", payload.orgId),
        getExportStoreRows("bankAccounts", "organizationId", payload.orgId),
        getExportStoreRows("documents", "organizationId", payload.orgId),
        getExportStoreRows("activities", "organizationId", payload.orgId),
        getExportStoreRows("attachments", "organizationId", payload.orgId)
      ]);
      data.boardMembers = (boardMembers || []).length;
      data.bankAccounts = (bankAccounts || []).length;
      data.documents = (documents || []).length;
      data.activities = (activities || []).length;
      data.attachments = (attachments || []).length;
    }

    return data;
  }

  function randomCredentialSalt() {
    const bytes = new Uint8Array(18);
    crypto.getRandomValues(bytes);
    return Array.from(bytes).map(value => value.toString(16).padStart(2, "0")).join("");
  }

  async function verifyCredentialOverridePassword(password, record) {
    if (!record?.passwordSalt || !record?.passwordHash) return false;
    const digest = await sha256(`${record.passwordSalt}:${password}`);
    return digest === record.passwordHash;
  }

  async function saveCredentialOverride(username, password) {
    const organizationId = currentOrganizationId();
    if (!organizationId) throw new Error("شناسه سمن در دسترس نیست.");
    const passwordSalt = randomCredentialSalt();
    const passwordHash = await sha256(`${passwordSalt}:${password}`);
    await putAppSetting({
      settingId: settingIdForCredentials(organizationId),
      organizationId,
      username,
      passwordSalt,
      passwordHash,
      hashAlgorithm: "SHA-256:SALT:COLON:PASSWORD",
      updatedAt: new Date().toISOString()
    });
  }

  function backupDataRecord(record) {
    const copy = { ...record };
    delete copy.blob;
    delete copy.fileBlob;
    delete copy.dataBlob;
    delete copy.file;
    return copy;
  }

  async function createCompleteDatabaseBackup(requestedFileName = "") {
    const organizationId = currentOrganizationId();
    if (!organizationId) throw new Error("شناسه سمن برای تهیه بکاپ پیدا نشد.");

    const storeNames = await getAllDatabaseStoreNames();
    const files = [];
    const storeStats = [];
    const binaryStats = [];
    let binaryCount = 0;

    for (const storeName of storeNames) {
      const records = await getAllRecordsForStore(storeName);
      const serializableRecords = [];

      for (const record of records) {
        const copy = backupDataRecord(record);
        if (storeName === "attachments") {
          const bytes = await attachmentBytes(record);
          if (bytes) {
            const ext = fileExtensionFromMime(record.mimeType || record.type || "");
            const binaryPath = `binary/attachments/${fileNameSafe(record.attachmentId, `attachment_${binaryCount + 1}`)}.${ext}`;
            copy.backupBinaryPath = binaryPath;
            files.push({ path: binaryPath, data: bytes });
            binaryStats.push({ attachmentId: record.attachmentId, path: binaryPath, bytes: bytes.length });
            binaryCount++;
          }
        }
        serializableRecords.push(copy);
      }

      files.push(exportJsonFile(`database/${storeName}.json`, {
        storeName,
        records: serializableRecords
      }));
      storeStats.push({ storeName, records: serializableRecords.length });
    }

    const fileInventory = files.map(file => ({
      path: file.path,
      bytes: file.data.length,
      crc32: crc32(file.data).toString(16).padStart(8, "0")
    }));

    const manifest = {
      format: LOCAL_BACKUP_FORMAT,
      backupVersion: LOCAL_BACKUP_VERSION,
      createdAt: new Date().toISOString(),
      databaseName: FINANCE_DB,
      organization: exportOrganizationRef(),
      storeStats,
      binaryStats,
      integrity: {
        algorithm: "CRC32",
        files: fileInventory,
        manifestExcludesItself: true
      },
      restorePolicy: "REPLACE_LOCAL_DATABASE_FOR_SAME_ORGANIZATION"
    };

    files.unshift(exportJsonFile("backup-manifest.json", manifest));
    const blob = buildStoredZip(files);
    const defaultName = fileNameSafe([
      state.license?.payload?.organizationName || "سمن",
      "بکاپ-کامل-دیتابیس",
      exportJalaliDateStamp()
    ].join("_"), "database_backup") + ".zip";

    return {
      blob,
      manifest,
      fileName: normalizeZipFileName(requestedFileName || defaultName)
    };
  }

  function zipReadU16(bytes, offset) {
    return new DataView(bytes.buffer, bytes.byteOffset + offset, 2).getUint16(0, true);
  }

  function zipReadU32(bytes, offset) {
    return new DataView(bytes.buffer, bytes.byteOffset + offset, 4).getUint32(0, true);
  }

  function readStoredZipArchive(arrayBuffer) {
    const bytes = new Uint8Array(arrayBuffer);
    const minimumEnd = 22;
    let endOffset = -1;
    const searchStart = Math.max(0, bytes.length - 65557);

    for (let index = bytes.length - minimumEnd; index >= searchStart; index--) {
      if (zipReadU32(bytes, index) === 0x06054B50) {
        endOffset = index;
        break;
      }
    }
    if (endOffset < 0) throw new Error("ساختار فایل ZIP معتبر نیست.");
    const entries = zipReadU16(bytes, endOffset + 10);
    const centralOffset = zipReadU32(bytes, endOffset + 16);
    const decoder = new TextDecoder("utf-8");
    const files = new Map();
    let cursor = centralOffset;

    for (let index = 0; index < entries; index++) {
      if (zipReadU32(bytes, cursor) !== 0x02014B50) throw new Error("فهرست فایل‌های ZIP معتبر نیست.");
      const compression = zipReadU16(bytes, cursor + 10);
      const compressedSize = zipReadU32(bytes, cursor + 20);
      const nameLength = zipReadU16(bytes, cursor + 28);
      const extraLength = zipReadU16(bytes, cursor + 30);
      const commentLength = zipReadU16(bytes, cursor + 32);
      const localOffset = zipReadU32(bytes, cursor + 42);
      const name = decoder.decode(bytes.slice(cursor + 46, cursor + 46 + nameLength));

      if (compression !== 0) {
        throw new Error("این فایل بکاپ با فشرده‌سازی پشتیبانی‌نشده ساخته شده است. فقط بکاپ تولیدشده توسط همین برنامه قابل بازیابی است.");
      }
      if (zipReadU32(bytes, localOffset) !== 0x04034B50) throw new Error("یکی از فایل‌های ZIP معتبر نیست.");
      const localNameLength = zipReadU16(bytes, localOffset + 26);
      const localExtraLength = zipReadU16(bytes, localOffset + 28);
      const dataOffset = localOffset + 30 + localNameLength + localExtraLength;
      files.set(name, bytes.slice(dataOffset, dataOffset + compressedSize));

      cursor += 46 + nameLength + extraLength + commentLength;
    }
    return files;
  }

  function readZipJson(files, path) {
    const bytes = files.get(path);
    if (!bytes) throw new Error(`فایل ضروری «${path}» در بکاپ وجود ندارد.`);
    try {
      return JSON.parse(new TextDecoder("utf-8").decode(bytes));
    } catch (_) {
      throw new Error(`فایل «${path}» قابل خواندن نیست.`);
    }
  }

  async function inspectLocalBackupFile(file) {
    const files = readStoredZipArchive(await file.arrayBuffer());
    const manifest = readZipJson(files, "backup-manifest.json");

    if (manifest.format !== LOCAL_BACKUP_FORMAT || Number(manifest.backupVersion) !== LOCAL_BACKUP_VERSION) {
      throw new Error("این فایل، بکاپ سازگار با این نسخه از برنامه نیست.");
    }

    const expectedOrgId = currentOrganizationId();
    if (!manifest.organization?.organizationId || manifest.organization.organizationId !== expectedOrgId) {
      throw new Error("این بکاپ مربوط به سمن دیگری است و قابل وارد کردن نیست.");
    }

    const stores = {};
    for (const item of manifest.storeStats || []) {
      const path = `database/${item.storeName}.json`;
      if (!files.has(path)) throw new Error(`فایل دیتابیس «${item.storeName}» در بکاپ وجود ندارد.`);
      const payload = readZipJson(files, path);
      stores[item.storeName] = Array.isArray(payload.records) ? payload.records : [];
    }

    return { files, manifest, stores };
  }

  async function replaceDatabaseFromBackup(backup) {
    const db = await openFinanceDb();
    try {
      const availableStores = Array.from(db.objectStoreNames);
      const clearTx = db.transaction(availableStores, "readwrite");
      availableStores.forEach(name => clearTx.objectStore(name).clear());
      await transactionDone(clearTx, "پاک‌سازی دیتابیس پیش از بازیابی انجام نشد.");

      for (const [storeName, records] of Object.entries(backup.stores)) {
        if (!availableStores.includes(storeName)) continue;
        const restoreTx = db.transaction(storeName, "readwrite");
        const store = restoreTx.objectStore(storeName);

        for (const sourceRecord of records) {
          const record = { ...sourceRecord };
          if (storeName === "attachments" && record.backupBinaryPath) {
            const bytes = backup.files.get(record.backupBinaryPath);
            if (!bytes) throw new Error(`فایل پیوست «${record.backupBinaryPath}» در بکاپ یافت نشد.`);
            record.blob = new Blob([bytes], { type: record.mimeType || "application/octet-stream" });
            delete record.backupBinaryPath;
          }
          store.put(record);
        }
        await transactionDone(restoreTx, `بازیابی داده‌های «${storeName}» انجام نشد.`);
      }
    } finally {
      db.close();
    }
  }

  async function saveOrganizationRegistration(profile, pendingFile, removeLicense, existingLicense) {
    const payload = state.license?.payload || {};
    const organizationId = payload.orgId || "";
    if (!organizationId) throw new Error("شناسه سمن از فایل اکتیو دریافت نشد.");

    const now = new Date().toISOString();
    const licenseDocumentId = `LICENSE-${organizationId}`;
    const attachmentId = `ATTACHMENT-LICENSE-${organizationId}`;

    const db = await openFinanceDb();
    try {
      const tx = db.transaction(
        ["organizationProfiles", "documents", "attachments"],
        "readwrite"
      );

      tx.objectStore("organizationProfiles").put({
        ...profile,
        organizationId,
        updatedAt: now,
        createdAt: profile.createdAt || now
      });

      const docs = tx.objectStore("documents");
      const attachments = tx.objectStore("attachments");

      if (removeLicense && existingLicense?.document) {
        docs.delete(existingLicense.document.documentId);
        if (existingLicense.document.attachmentId) attachments.delete(existingLicense.document.attachmentId);
      }

      if (pendingFile) {
        const oldAttachmentId = existingLicense?.document?.attachmentId;
        if (oldAttachmentId && oldAttachmentId !== attachmentId) attachments.delete(oldAttachmentId);

        docs.put({
          documentId: licenseDocumentId,
          organizationId,
          category: "organization_license",
          title: "مجوز فعالیت سمن",
          attachmentId,
          fileName: pendingFile.name || `license.${fileExtensionFromMime(pendingFile.type)}`,
          mimeType: pendingFile.type || "application/octet-stream",
          sizeBytes: Number(pendingFile.size || 0),
          createdAt: existingLicense?.document?.createdAt || now,
          updatedAt: now
        });

        attachments.put({
          attachmentId,
          organizationId,
          entityType: "organization-license",
          entityId: organizationId,
          fileName: pendingFile.name || `license.${fileExtensionFromMime(pendingFile.type)}`,
          mimeType: pendingFile.type || "application/octet-stream",
          sizeBytes: Number(pendingFile.size || 0),
          blob: pendingFile,
          createdAt: existingLicense?.attachment?.createdAt || now,
          updatedAt: now
        });
      }

      await transactionDone(tx, "ذخیره اطلاعات سمن انجام نشد.");
    } finally {
      db.close();
    }
  }

  function readJalaliNumber(id) {
    return Number(latinDigits(document.getElementById(id)?.value || "").replace(/\D/g, "")) || 0;
  }

  function gregorianFromJalali(jy, jm, jd) {
    let year = Number(jy) + 1595;
    let days = -355668 + (365 * year) + Math.floor(year / 33) * 8 + Math.floor(((year % 33) + 3) / 4) + Number(jd);
    days += Number(jm) < 7 ? (Number(jm) - 1) * 31 : (Number(jm) - 7) * 30 + 186;

    let gy = 400 * Math.floor(days / 146097);
    days %= 146097;

    if (days > 36524) {
      gy += 100 * Math.floor(--days / 36524);
      days %= 36524;
      if (days >= 365) days++;
    }

    gy += 4 * Math.floor(days / 1461);
    days %= 1461;

    if (days > 365) {
      gy += Math.floor((days - 1) / 365);
      days = (days - 1) % 365;
    }

    let gd = days + 1;
    const gMonthDays = [0, 31, ((gy % 4 === 0 && gy % 100 !== 0) || gy % 400 === 0) ? 29 : 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
    let gm = 0;
    while (gm < 13 && gd > gMonthDays[gm]) {
      gd -= gMonthDays[gm];
      gm++;
    }
    return { year: gy, month: gm, day: gd };
  }

  function isJalaliLeapYear(year) {
    const base = Number(year) - (Number(year) >= 0 ? 474 : 473);
    const cycleYear = 474 + (((base % 2820) + 2820) % 2820);
    return (((cycleYear + 38) * 682) % 2816) < 682;
  }

  function jalaliMonthDays(year, month) {
    if (month >= 1 && month <= 6) return 31;
    if (month >= 7 && month <= 11) return 30;
    if (month === 12) return isJalaliLeapYear(year) ? 30 : 29;
    return 0;
  }

  function getLicenseExpiryInfo(year, month, day, duration) {
    const jy = Number(year);
    const jm = Number(month);
    const jd = Number(day);
    const years = Number(duration);

    if (!jy || !jm || !jd || !years) return null;
    if (jm < 1 || jm > 12 || jd < 1 || jd > jalaliMonthDays(jy, jm) || years < 1) {
      return { invalid: true };
    }

    const expiryYear = jy + years;
    const expiryMonth = jm;
    const expiryDay = Math.min(jd, jalaliMonthDays(expiryYear, expiryMonth));
    const expiryGregorian = gregorianFromJalali(expiryYear, expiryMonth, expiryDay);
    const today = jalaliToday();
    const todayGregorian = gregorianFromJalali(today.year, today.month, today.day);

    const expiryMs = Date.UTC(expiryGregorian.year, expiryGregorian.month - 1, expiryGregorian.day, 12);
    const todayMs = Date.UTC(todayGregorian.year, todayGregorian.month - 1, todayGregorian.day, 12);
    const daysRemaining = Math.round((expiryMs - todayMs) / 86400000);

    let status = "valid";
    if (daysRemaining < 0) status = "expired";
    else if (daysRemaining <= 30) status = "near";

    return {
      expiryYear,
      expiryMonth,
      expiryDay,
      daysRemaining,
      status
    };
  }

  function licenseStatusHtml(info) {
    if (!info) return `<div class="license-countdown empty"><strong>روز شمار مجوز</strong><span>تاریخ تمدید و مدت فعالیت را وارد کنید.</span></div>`;
    if (info.invalid) return `<div class="license-countdown expired"><strong>تاریخ مجوز معتبر نیست</strong><span>روز، ماه، سال و مدت فعالیت را بررسی کنید.</span></div>`;

    const title = info.status === "expired"
      ? "مجوز منقضی شده است"
      : info.status === "near"
        ? "مجوز نزدیک به انقضا است"
        : "مجوز معتبر است";

    const remainingText = info.daysRemaining < 0
      ? `${persianDigits(Math.abs(info.daysRemaining))} روز از انقضا گذشته`
      : `${persianDigits(info.daysRemaining)} روز تا انقضا باقی مانده`;

    return `<div class="license-countdown ${info.status}">
      <div><strong>${title}</strong><span>تاریخ انقضا: ${persianDigits(info.expiryYear)}/${persianDigits(String(info.expiryMonth).padStart(2, "0"))}/${persianDigits(String(info.expiryDay).padStart(2, "0"))}</span></div>
      <b>${remainingText}</b>
    </div>`;
  }

  function renderLicenseFilePreview(target, selectedFile, existingLicense, removeExisting, objectUrlRef) {
    const existingFile = !removeExisting ? existingLicense?.attachment : null;
    const file = selectedFile || existingFile;
    if (objectUrlRef.value) {
      try { URL.revokeObjectURL(objectUrlRef.value); } catch (_) {}
      objectUrlRef.value = "";
    }

    if (!file) {
      target.innerHTML = `<div class="license-empty-preview">
        ${icon("file")}
        <strong>تصویر یا فایل مجوز هنوز ثبت نشده است</strong>
        <span>فرمت‌های قابل قبول: تصویر یا PDF</span>
      </div>`;
      return;
    }

    const mime = file.type || file.mimeType || "";
    const isImage = mime.startsWith("image/");
    let visual = "";
    if (isImage && file instanceof Blob) {
      objectUrlRef.value = URL.createObjectURL(file);
      visual = `<img src="${objectUrlRef.value}" alt="پیش‌نمایش مجوز سمن">`;
    } else if (isImage && file.dataUrl) {
      visual = `<img src="${file.dataUrl}" alt="پیش‌نمایش مجوز سمن">`;
    } else {
      visual = `<div class="license-pdf-preview">PDF</div>`;
    }

    const fileName = selectedFile?.name || existingFile?.fileName || "مجوز فعالیت سمن";
    const size = Number(selectedFile?.size || existingFile?.sizeBytes || 0);

    target.innerHTML = `<div class="license-file-preview">
      <div class="license-file-visual">${visual}</div>
      <div class="license-file-info">
        <strong>${escapeHtml(fileName)}</strong>
        <span>${size ? `${persianDigits(Math.ceil(size / 1024))} کیلوبایت` : "فایل ذخیره‌شده"}</span>
        <em>${selectedFile ? "آماده ذخیره در پرونده سمن" : "فایل ذخیره‌شده در پرونده سمن"}</em>
      </div>
      <button class="license-remove-button" id="remove-license-file" type="button">حذف</button>
    </div>`;
  }

  const BOARD_POSITIONS = [
    "رئیس هیأت مدیره",
    "نایب‌رئیس هیأت مدیره",
    "مدیرعامل",
    "خزانه‌دار",

  function splitCeoFullName(fullName) {
    const parts = String(fullName || "").trim().split(/\s+/).filter(Boolean);
    if (!parts.length) return { firstName: "", lastName: "" };
    return {
      firstName: parts[0],
      lastName: parts.slice(1).join(" ") || ""
    };
  }

  function boardPositionOptions(selected = "", isCeo = false) {
    const positions = isCeo
      ? ["مدیرعامل"]
      : BOARD_POSITIONS.filter(item => item !== "مدیرعامل");
    return positions.map(item =>
      `<option value="${escapeHtml(item)}" ${item === selected ? "selected" : ""}>${escapeHtml(item)}</option>`
    ).join("");
  }

  function normalizeMobile(value) {
    let digits = latinDigits(value).replace(/\D/g, "");
    if (digits.startsWith("0098")) digits = "0" + digits.slice(4);
    else if (digits.startsWith("98")) digits = "0" + digits.slice(2);
    else if (digits.startsWith("9") && digits.length === 10) digits = "0" + digits;
    return digits.slice(0, 11);
  }

  async function getBoardMembersForOrganization() {
    const db = await openFinanceDb();
    try {
      const orgId = state.license?.payload?.orgId || "";
      const tx = db.transaction("boardMembers", "readonly");
      const rows = await idbRequest(tx.objectStore("boardMembers").index("organizationId").getAll(orgId));
      return (rows || []).sort((a, b) => {
        if (a.isCeo && !b.isCeo) return -1;
        if (!a.isCeo && b.isCeo) return 1;
        return String(a.lastName || "").localeCompare(String(b.lastName || ""), "fa");
      });
    } finally {
      db.close();
    }
  }

  async function getBoardMember(memberId) {
    const db = await openFinanceDb();
    try {
      const tx = db.transaction("boardMembers", "readonly");
      return await idbRequest(tx.objectStore("boardMembers").get(memberId));
    } finally {
      db.close();
    }
  }

  async function saveBoardMember(member) {
    const db = await openFinanceDb();
    try {
      const tx = db.transaction("boardMembers", "readwrite");
      tx.objectStore("boardMembers").put(member);
      await transactionDone(tx, "ثبت اطلاعات عضو هیأت مدیره انجام نشد.");
    } finally {
      db.close();
    }
  }

  async function deleteBoardMember(memberId) {
    const existing = await getBoardMember(memberId);
    if (!existing) return;
    if (existing.isCeo) throw new Error("مدیرعامل از فایل اکتیو ثبت شده و قابل حذف نیست.");
    const db = await openFinanceDb();
    try {
      const tx = db.transaction("boardMembers", "readwrite");
      tx.objectStore("boardMembers").delete(memberId);
      await transactionDone(tx, "حذف عضو هیأت مدیره انجام نشد.");
    } finally {
      db.close();
    }
  }

  async function syncCeoFromActivation() {
    const payload = state.license?.payload;
    if (!payload?.orgId) throw new Error("اطلاعات فایل اکتیو برای تشکیل هیأت مدیره کافی نیست.");

    const memberId = `CEO-${payload.orgId}`;
    const existing = await getBoardMember(memberId);
    const nameParts = splitCeoFullName(payload.ceoFullName);
    const synced = {
      memberId,
      organizationId: payload.orgId,
      firstName: nameParts.firstName,
      lastName: nameParts.lastName,
      fatherName: existing?.fatherName || "",
      nationalCode: latinDigits(payload.nationalCode || "").replace(/\D/g, ""),
      mobile: normalizeMobile(payload.phone || ""),
      education: existing?.education || "",
      position: "مدیرعامل",
      isCeo: true,
      source: "activation_file",
      createdAt: existing?.createdAt || new Date().toISOString(),
      updatedAt: new Date().toISOString()
    };
    await saveBoardMember(synced);
    return synced;
  }

  function onlyDigits(value) {
    return latinDigits(value).replace(/\D/g, "");
  }

  function normalizeIban(value) {
    const raw = String(value || "").toUpperCase().replace(/\s/g, "");
    if (!raw) return "";
    return raw.startsWith("IR") ? raw : `IR${onlyDigits(raw)}`;
  }

  function maskBankValue(value, keep = 4) {
    const text = String(value || "");
    if (!text) return "—";
    if (text.length <= keep) return text;
    return `${"•".repeat(Math.max(0, text.length - keep))}${text.slice(-keep)}`;
  }

    const db = await openFinanceDb();

      const tx = db.transaction("bankAccounts", "readonly");
      const records = await idbRequest(tx.objectStore("bankAccounts").index("organizationId").getAll(orgId));
      return (records || [])
        .filter(item => includeInactive || item.isActive !== false)
        .sort((a, b) => Number(b.createdAt || 0) - Number(a.createdAt || 0));
    } finally {
      db.close();
    }
  }

  function readBankAllocations(accounts) {

      const input = document.querySelector(`[data-bank-allocation="${account.accountId}"]`);
      const amount = normalizeAmount(input?.value || 0);
      return {
        accountId: account.accountId,
        bankName: account.bankName,
        accountHolder: account.accountHolder,
        amount
      };
    }).filter(item => item.amount > 0);

    return allocations;
  }

  function bindBankAllocationInputs(accounts, requiredTotal) {
    const inputs = document.querySelectorAll("[data-bank-allocation]");
    if (!inputs.length) return;

    const update = () => {
      inputs.forEach(input => { input.value = formatMoneyInput(input.value); });
      const total = readBankAllocations(accounts).reduce((sum, item) => sum + item.amount, 0);
      const totalNode = document.getElementById("bank-allocation-total");
      const note = document.getElementById("bank-allocation-note");
      if (totalNode) totalNode.textContent = formatAmount(total);
      if (note) {
        const diff = total - Number(requiredTotal || 0);
        note.textContent = diff === 0
          ? "جمع مبالغ حساب‌ها با مبلغ کل فایل مددجوها برابر است."
          : `اختلاف با مبلغ کل فایل: ${formatAmount(Math.abs(diff))} ${diff < 0 ? "کمتر" : "بیشتر"}`;
        note.className = diff === 0 ? "finance-status allocation-ok" : "finance-status allocation-warning";
      }
    };

    inputs.forEach(input => input.addEventListener("input", update));
    update();
  }

  async function getBankAllocationsForConfirm(requiredTotal) {
    const accounts = await getActiveBankAccounts();
    if (!accounts.length) {
      throw new Error("ابتدا در بخش حساب سمن، حداقل یک حساب بانکی فعال ثبت کنید.");
    }
    const allocations = readBankAllocations(accounts);
    const total = allocations.reduce((sum, item) => sum + item.amount, 0);
    if (!allocations.length) {
      throw new Error("مبلغ واریزی حداقل یک حساب بانکی را وارد کنید.");
    }
    if (total !== Number(requiredTotal || 0)) {
      throw new Error(`جمع مبالغ حساب‌ها باید دقیقاً برابر ${formatAmount(requiredTotal)} باشد.`);
    }
    return allocations;
  }

  async function getPreviousCarryForward(organizationId, monthId) {
    const db = await openFinanceDb();
    try {
      const tx = db.transaction("monthlyAccounting", "readonly");
      const rows = await idbRequest(tx.objectStore("monthlyAccounting").index("organizationId").getAll(organizationId));
      const previous = (rows || [])
        .filter(row => String(row.monthId || "") < String(monthId || "") && row.status === "issued")
        .sort((a, b) => String(b.monthId || "").localeCompare(String(a.monthId || "")))[0];
      return Number(previous?.carryForward || 0);
    } finally {
      db.close();
    }
  }

  async function getCurrentExpensesForMonth(organizationId, jalaliYear, jalaliMonth) {
    const db = await openFinanceDb();
    try {
      const tx = db.transaction("expenses", "readonly");
      const rows = await idbRequest(tx.objectStore("expenses").index("organizationId").getAll(organizationId));
      const prefix = `${jalaliYear}/${String(jalaliMonth).padStart(2, "0")}/`;
      const matched = (rows || [])
        .filter(item => String(item.expenseDateJalali || "").startsWith(prefix))
        .map(({ payee, ...item }) => item);
      return {
        count: matched.length,
        total: matched.reduce((sum, item) => sum + Number(item.amount || 0), 0),
        items: matched
      };
    } finally {
      db.close();
    }
  }

  async function saveMonthlyAccounting(record) {
    const db = await openFinanceDb();
    try {
      const tx = db.transaction("monthlyAccounting", "readwrite");
      tx.objectStore("monthlyAccounting").put(record);
      await transactionDone(tx, "ثبت حسابداری ماه انجام نشد.");
    } finally {

    }
  }

  async function deleteEntireMonthlyFinance(monthlyFile) {
    const records = await getPaymentsForBatch(monthlyFile.batchId);
    const db = await openFinanceDb();
    try {
      const tx = db.transaction(
        ["monthlyAccounting", "monthlyFiles", "batches", "payments", "beneficiaryLedger"],
        "readwrite"
      );

      tx.objectStore("monthlyAccounting").delete(monthlyFile.monthKey);
      tx.objectStore("monthlyFiles").delete(monthlyFile.monthKey);
      tx.objectStore("batches").delete(monthlyFile.batchId);

      const paymentStore = tx.objectStore("payments");
      const ledgerStore = tx.objectStore("beneficiaryLedger");
      records.forEach(record => {
        paymentStore.delete(record.recordId);
        ledgerStore.delete(`${monthlyFile.monthKey}:${record.nationalCode}`);
      });

      await transactionDone(tx, "حذف اطلاعات ماه انجام نشد.");
    } finally {
      db.close();
    }
  }

  function accountingTotals(monthlyFile, accounts, fixedExpenses, carryIn) {
    const bankAllocations = readAccountingBankInputs(accounts);
    const bankTotal = bankAllocations.reduce((sum, item) => sum + Number(item.amount || 0), 0);
    const cashDonations = normalizeAmount(document.getElementById("cash-donations")?.value || 0);
    const charityBoxes = normalizeAmount(document.getElementById("charity-boxes")?.value || 0);
    const totalBeneficiaries = Number(latinDigits(document.getElementById("total-beneficiaries")?.value || "").replace(/\D/g, "")) || 0;

    // تعداد دارای دریافتی از لیست پرداخت‌های تأییدشده همان ماه خوانده می‌شود؛
    // کاربر آن را دستی وارد نمی‌کند.
    const beneficiariesPaid = Number(monthlyFile.recordCount || 0);

    // تعداد بدون دریافتی به‌صورت خودکار محاسبه می‌شود.
    const beneficiariesUnpaid = Math.max(0, totalBeneficiaries - beneficiariesPaid);

    const paidInput = document.getElementById("beneficiaries-paid");
    const unpaidInput = document.getElementById("beneficiaries-unpaid");
    if (paidInput) paidInput.value = persianDigits(beneficiariesPaid);
    if (unpaidInput) unpaidInput.value = persianDigits(beneficiariesUnpaid);

    const resources = Number(carryIn || 0) + bankTotal + cashDonations + charityBoxes;
    const beneficiaryPayments = Number(monthlyFile.totalAmount || 0);
    const outgoings = beneficiaryPayments + Number(fixedExpenses || 0);
    const balance = resources - outgoings;

    return {
      bankAllocations,
      bankTotal,
      cashDonations,
      charityBoxes,
      totalBeneficiaries,
      beneficiariesPaid,
      beneficiariesUnpaid,
      carryIn: Number(carryIn || 0),
      currentExpenses: Number(fixedExpenses || 0),
      beneficiaryPayments,
      resources,
      outgoings,
      balance,
      carryForward: Math.max(0, balance),
      deficit: Math.max(0, -balance)
    };
  }

  function validateAccountingTotals(totals) {
    if (!totals.totalBeneficiaries) {
      throw new Error("جمع کل مددجویان تحت پوشش سمن را وارد کنید.");
    }
    if (totals.totalBeneficiaries < totals.beneficiariesPaid) {
      throw new Error(`جمع کل مددجویان تحت پوشش نمی‌تواند کمتر از تعداد دریافت‌کنندگان این ماه (${persianDigits(totals.beneficiariesPaid)} نفر) باشد.`);
    }
  }

    result.innerHTML = `
      <div><span>جمع منابع این ماه</span><strong>${formatAmount(totals.resources)}</strong></div>
      <div><span>جمع پرداخت مددجوها</span><strong>${formatAmount(totals.beneficiaryPayments)}</strong></div>
      <div><span>جمع هزینه‌های جاری</span><strong>${formatAmount(totals.currentExpenses)}</strong></div>

  async function downloadBeneficiaryReport(monthlyFile, accounting, records) {
    const header = [
      "نام سمن", "ماه", "تاریخ پرداخت", "نام و نام خانوادگی", "کد ملی",
      "نوع مقصد", "شماره حساب یا کارت", "مبلغ واریزی (ریال)", "وضعیت"
    ];

    const rows = records.map(record => [
      monthlyFile.organizationName,
      monthlyFile.monthLabel,
      monthlyFile.paymentDateJalali,
      record.fullName || `${record.firstName} ${record.lastName}`.trim(),
      record.nationalCode,
      record.destinationType,
      record.destination,
      record.amount,
      "تأیید و ثبت شد"
    ]);

    const summary = [
      ["گزارش مالی ماهانه سمن", monthlyFile.organizationName],
      ["ماه", monthlyFile.monthLabel],
      ["تعداد واریزی", accounting.beneficiariesPaid],
      ["تعداد واریز نشده", accounting.beneficiariesUnpaid],
      ["مبلغ واریزشده به مددجوها (ریال)", accounting.beneficiaryPayments],
      ["جمع هزینه‌های جاری (ریال)", accounting.currentExpenses],
      ["جمع منابع (ریال)", accounting.resources],
      ["مازاد/کسری (ریال)", accounting.balance],
      ["مانده منتقل‌شده به ماه آینده (ریال)", accounting.carryForward],
      [],
      header,
      ...rows
    ];

    const csvEscape = value => {
      const text = String(value ?? "");
      return `"${text.replace(/"/g, '""')}"`;
    };
    const csv = "\uFEFF" + summary.map(row => row.map(csvEscape).join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
    const fileName = `گزارش_${monthlyFile.organizationName}_${monthlyFile.monthLabel}.csv`.replace(/\s+/g, "_");
    const nativeResult = await saveBlobWithNativeAndroid(blob, fileName);
    if (!nativeResult?.saved) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }
    showToast(nativeResult?.saved
      ? "فایل گزارش در پوشه Downloads/SamaneSamanha ذخیره شد."
      : "فایل لیست مددجویان و گزارش ماهانه آماده شد.", "success");
  }

  async function getExpensesForOrganization() {
    const db = await openFinanceDb();
    const orgId = state.license?.payload?.orgId || "";
    try {
      const tx = db.transaction("expenses", "readonly");
      const store = tx.objectStore("expenses");
      const index = store.index("organizationId");
      const rows = await idbRequest(index.getAll(orgId));
      return (rows || []).map(({ payee, ...item }) => item).sort((a, b) => {
        const dateCompare = String(b.expenseDateJalali || "").localeCompare(String(a.expenseDateJalali || ""));
        return dateCompare || String(b.createdAt || "").localeCompare(String(a.createdAt || ""));
      });
    } finally {
      db.close();
    }
  }

  async function saveExpenseRecord(record) {
    const db = await openFinanceDb();
    try {
      await new Promise((resolve, reject) => {
        const tx = db.transaction("expenses", "readwrite");
        tx.objectStore("expenses").put(record);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error || new Error("ذخیره هزینه در دیتابیس محلی انجام نشد."));
        tx.onabort = () => reject(tx.error || new Error("ذخیره هزینه لغو شد."));
      });
    } finally {
      db.close();
    }
  }

  async function deleteExpenseRecord(expenseId) {
    const db = await openFinanceDb();
    try {
      await new Promise((resolve, reject) => {
        const tx = db.transaction("expenses", "readwrite");
        tx.objectStore("expenses").delete(expenseId);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error || new Error("حذف هزینه از دیتابیس محلی انجام نشد."));
      });
    } finally {
      db.close();
    }
  }

        const entered = latinDigits(document.getElementById("expenses-national-code").value).replace(/\D/g, "");
        const expected = latinDigits(state.license?.payload?.nationalCode).replace(/\D/g, "");
        if (!entered) throw new Error("کد ملی مدیرعامل را وارد کنید.");
        if (entered !== expected) throw new Error("کد ملی با اطلاعات فایل اکتیو مطابقت ندارد.");
        state.expenses.verified = true;
        state.expenses.query = "";
        state.expenses.page = 1;
        renderExpensesDashboard();
      } catch (error) {
        logError(error, "احراز هویت هزینه‌های جاری");
        status.textContent = error.message || "احراز هویت انجام نشد.";
      }
    });
  }

  function expenseMatches(item, query) {
    if (!query) return true;
    const q = normalizeText(query);
    const utilityText = Array.isArray(item.utilityItems)
      ? item.utilityItems.map(row => `${row.title || ""}${row.amount || ""}`).join(" ")
      : "";
    return normalizeText(`${item.category}${utilityText}${item.paymentMethod}${item.referenceNumber}${item.description}${item.expenseDateJalali}`).includes(q);
  }

  function summarizeExpenses(items) {
    const today = jalaliToday();
    const currentMonthPrefix = `${today.year}/${String(today.month).padStart(2, "0")}`;
    const monthItems = items.filter(item => String(item.expenseDateJalali || "").startsWith(currentMonthPrefix));
    const totalAll = items.reduce((sum, item) => sum + Number(item.amount || 0), 0);
    const totalMonth = monthItems.reduce((sum, item) => sum + Number(item.amount || 0), 0);
    const topCategory = items.length
      ? Object.entries(items.reduce((acc, item) => {
          acc[item.category] = (acc[item.category] || 0) + Number(item.amount || 0);
          return acc;
        }, {})).sort((a, b) => b[1] - a[1])[0]?.[0] || "—"
      : "—";
    return { totalAll, totalMonth, count: items.length, monthCount: monthItems.length, topCategory };
  }

  function expenseDetailLabel(item) {
    if (Array.isArray(item.utilityItems) && item.utilityItems.length) {
      return item.utilityItems
        .filter(row => Number(row.amount || 0) > 0)
        .map(row => `${row.title}: ${formatAmount(row.amount)}`)
        .join(" · ");
    }
    return item.paymentMethod || "";
  }

  function renderExpenseRows() {
    const holder = document.getElementById("expense-list");
    if (!holder) return;
    const all = state.expenses.list || [];
    const filtered = all.filter(item => expenseMatches(item, state.expenses.query));
    const pageSize = 8;
    const pageCount = Math.max(1, Math.ceil(filtered.length / pageSize));
    state.expenses.page = Math.max(1, Math.min(state.expenses.page, pageCount));
    const from = (state.expenses.page - 1) * pageSize;
    const page = filtered.slice(from, from + pageSize);
    const filteredTotal = filtered.reduce((sum, item) => sum + Number(item.amount || 0), 0);

    holder.innerHTML = (page.length ? page.map(item => {
      const utilityCount = Array.isArray(item.utilityItems) ? item.utilityItems.filter(row => Number(row.amount || 0) > 0).length : 0;
      return `<article class="expense-item">
        <div class="expense-item-top">
          <div class="expense-category-badge">${icon("tag")}<span>${escapeHtml(item.category)}</span></div>
          <strong>${formatAmount(item.amount)}</strong>
        </div>
        <div class="expense-meta">
          <span>${icon("calendar")}${persianDigits(item.expenseDateJalali)}</span>
          <span>${utilityCount ? `${persianDigits(utilityCount)} ریزهزینه ثبت‌شده` : escapeHtml(item.paymentMethod || "—")}</span>
        </div>
        ${utilityCount ? `<div class="expense-utility-summary">${escapeHtml(expenseDetailLabel(item))}</div>` : ""}

    }).join("") : `<div class="empty-expenses">${icon("receipt")}<strong>هنوز هزینه‌ای ثبت نشده است.</strong><span>از دکمه «ثبت هزینه جدید» برای ثبت اولین هزینه استفاده کنید.</span></div>`) +
      `<section class="expense-total-summary">

      button.addEventListener("click", () => renderExpenseDeleteConfirm(button.dataset.expenseId));
    });

  const UTILITIES_CATEGORY = "آب، برق، گاز، تلفن و اینترنت";
  const DEFAULT_UTILITY_ITEMS = ["آب", "برق", "گاز", "تلفن", "اینترنت"];

  function normalizeUtilityItems(items = []) {
    const source = Array.isArray(items) && items.length
      ? items
      : DEFAULT_UTILITY_ITEMS.map(title => ({ title, amount: 0 }));
    return source.map((row, index) => ({
      rowId: row.rowId || `utility-${Date.now()}-${index}-${Math.random().toString(36).slice(2, 7)}`,
      title: String(row.title || "").trim() || `مورد ${index + 1}`,
      amount: Number(row.amount || 0)
    }));
  }

  function utilityRowsMarkup(rows) {
    return rows.map((row, index) => `<div class="utility-expense-row" data-utility-row="${escapeHtml(row.rowId)}">
      <div class="utility-row-title">
        <input class="utility-title-input" value="${escapeHtml(row.title)}" placeholder="عنوان هزینه">
      </div>
      <div class="utility-row-amount">
        <input class="utility-amount-input" inputmode="numeric" value="${row.amount ? escapeHtml(formatMoneyInput(row.amount)) : ""}" placeholder="مبلغ">

      </div>
      <button class="utility-row-remove" type="button" title="حذف ردیف" ${rows.length <= 1 ? "disabled" : ""}>×</button>
    </div>`).join("");
  }

    return [...document.querySelectorAll("[data-utility-row]")].map(row => ({
      rowId: row.dataset.utilityRow,
      title: row.querySelector(".utility-title-input")?.value.trim() || "",
      amount: normalizeAmount(row.querySelector(".utility-amount-input")?.value || "")
    })).filter(row => row.title || row.amount);
  }

  function utilityTotalFromForm() {
    return utilityRowsFromForm().reduce((sum, row) => sum + Number(row.amount || 0), 0);
  }

            <div id="single-expense-amount" class="field ${initialCategory === UTILITIES_CATEGORY ? "hidden" : ""}">

            <div class="field"><label for="expense-description">شرح هزینه <small>(اختیاری)</small></label><textarea id="expense-description" class="expense-textarea" placeholder="توضیح کوتاه درباره هزینه">${existing ? escapeHtml(existing.description || "") : ""}</textarea></div>

    document.getElementById("expenses-back").onclick = renderExpensesDashboard;
    document.getElementById("expense-form-cancel").onclick = renderExpensesDashboard;

    const amountInput = document.getElementById("expense-amount");

      const isUtilities = categoryInput.value === UTILITIES_CATEGORY;

        ? `مبلغ قابل ثبت: ${formatAmount(amount)}`

          ? "حداقل مبلغ یکی از ریزهزینه‌ها را وارد کنید."
          : "مبلغ هزینه را وارد کنید.";

    const bindUtilityRows = () => {
      utilityRowsContainer.querySelectorAll(".utility-amount-input").forEach(input => {
        input.addEventListener("input", () => {
          input.value = formatMoneyInput(normalizeAmount(input.value));
          updatePreview();
        });
      });
      utilityRowsContainer.querySelectorAll(".utility-title-input").forEach(input => {
        input.addEventListener("input", updatePreview);
      });
      utilityRowsContainer.querySelectorAll(".utility-row-remove").forEach(button => {
        button.addEventListener("click", () => {
          const row = button.closest("[data-utility-row]");
          if (row) row.remove();
          if (!utilityRowsContainer.children.length) {
            utilityRowsContainer.innerHTML = utilityRowsMarkup([{ rowId: `utility-${Date.now()}`, title: "مورد جدید", amount: 0 }]);

          bindUtilityRows();
          updatePreview();
        });
      });
    };

    document.getElementById("add-utility-expense-row").onclick = () => {
      const newRow = { rowId: `utility-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`, title: "مورد جدید", amount: 0 };
      utilityRowsContainer.insertAdjacentHTML("beforeend", utilityRowsMarkup([newRow]));

          .map(row => ({ title: row.title, amount: Number(row.amount) }))
          : [];

          utilityItems,
          paymentMethod,
          referenceNumber,
          description,
          createdAt: existing?.createdAt || new Date().toISOString(),
          updatedAt: new Date().toISOString()
        };

        logError(error, "ثبت هزینه جاری");

      }
    });
  }
