<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b3f73">
  <title>سامانه مدیریت سمن‌ها و NGOها — نسخه v37</title>
  <style>
:root {
  --navy: #173a6b;
  --navy-dark: #102a4e;
  --sky: #2c8dc7;
  --cyan: #1da9bd;
  --coral: #f26a63;
  --coral-dark: #e4524a;
  --cream: #f5f7fb;
  --card: #ffffff;
  --ink: #253348;
  --muted: #6d7e94;
  --border: #dfe7f1;
  --success: #2b9d74;
  --danger: #d65252;
  --shadow: 0 16px 36px rgba(26, 47, 81, .12);
  --radius: 24px;
  font-family: Tahoma, "Vazirmatn", "IRANSans", Arial, sans-serif;
}
* { box-sizing: border-box; }
html, body { min-height: 100%; margin: 0; background: #e7edf5; color: var(--ink); }
body { display: grid; place-items: center; -webkit-tap-highlight-color: transparent; }
button, input { font: inherit; }
button { border: 0; cursor: pointer; }
.app-shell {
  width: min(100%, 460px);
  min-height: 100dvh;
  background: var(--cream);
  position: relative;
  overflow: hidden;
}
.page {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  animation: rise .26s ease-out;
}
@keyframes rise { from { opacity: .35; transform: translateY(9px); } to { opacity: 1; transform: translateY(0); } }
.app-header {
  background: linear-gradient(145deg, var(--navy) 0%, #1f528e 100%);
  color: #fff;
  padding: calc(22px + env(safe-area-inset-top)) 20px 24px;
  border-radius: 0 0 34px 34px;
  box-shadow: 0 10px 24px rgba(20, 57, 102, .25);
}
.header-row { display:flex; justify-content:space-between; align-items:center; gap:12px; }
.header-title { margin:0; font-size: 19px; font-weight: 800; }
.header-subtitle { margin: 7px 0 0; font-size: 12px; color: #d8e8f7; }
.header-icon-btn {
  width: 42px; height: 42px; display:grid; place-items:center; background: rgba(255,255,255,.14);
  border: 1px solid rgba(255,255,255,.18); color:#fff; border-radius: 14px;
}
.header-icon-btn:active { transform: scale(.96); }
.center-page { flex:1; display:grid; place-items:center; padding: 24px 18px 36px; }
.auth-card {
  width: 100%; background:#fff; border: 1px solid var(--border); box-shadow: var(--shadow);
  border-radius: 28px; padding: 27px 21px 22px;
}
.brand-mark {
  width: 72px; height:72px; margin: -61px auto 15px; border-radius: 24px; background: linear-gradient(145deg, #2a94c7, var(--navy));
  box-shadow: 0 12px 26px rgba(23,58,107,.30); display:grid; place-items:center; color:#fff;
  border: 5px solid var(--cream);
}
.brand-mark svg { width: 41px; height:41px; }
.auth-title { text-align:center; margin: 2px 0 8px; font-size: 20px; }
.auth-desc { text-align:center; color:var(--muted); font-size: 13px; line-height: 1.9; margin:0 0 22px; }
.file-panel { background:#f8fbff; border: 1.5px dashed #a7c7e8; border-radius: 18px; padding:15px; margin: 14px 0 17px; }
.file-panel h3 { font-size: 14px; margin:0 0 8px; color:var(--navy); }
.file-panel p { margin:0; color:var(--muted); font-size:12px; line-height:1.8; }
.file-actions { display:flex; gap:9px; margin-top: 13px; flex-wrap:wrap; }
.secondary-button, .primary-button, .ghost-button {
  min-height: 46px; padding: 0 15px; border-radius: 14px; font-weight: 800; transition: .16s ease;
}
.primary-button { width:100%; color:#fff; background: linear-gradient(135deg,var(--coral),var(--coral-dark)); box-shadow: 0 8px 16px rgba(242,106,99,.25); }
.primary-button:active { transform:translateY(1px) scale(.99); }
.secondary-button { background:#e8f3fb; color:var(--navy); border:1px solid #cde0ef; }
.ghost-button { background:transparent; color:var(--navy); border: 1px solid var(--border); }
.small-button { min-height: 40px; font-size: 12px; border-radius: 12px; }
.file-name {
  display:none; margin-top:11px; padding: 11px 12px; background:#eaf8f3; border-radius: 12px;
  color:#176e51; font-size:12px; word-break: break-word;
}
.file-name.visible { display:block; }
.divider { display:flex; align-items:center; gap:10px; color:#a2afbd; font-size:12px; margin:18px 0; }
.divider::before, .divider::after { content:""; height:1px; background:var(--border); flex:1; }
.field { margin: 13px 0; }
.field label { display:block; margin-bottom:7px; font-size: 13px; font-weight:700; color:#40536d; }
.input-wrap { position:relative; }
.input-wrap input {
  width:100%; min-height:51px; padding: 0 43px 0 13px; background:#fbfcfe; border:1.5px solid var(--border);
  border-radius:14px; color:var(--ink); outline:0; direction:rtl;
}
.input-wrap input:focus { border-color:#4e9ed2; background:#fff; box-shadow:0 0 0 3px rgba(44,141,199,.12); }
.input-icon { position:absolute; right:14px; top:50%; transform:translateY(-50%); color:#7e9ab4; width:20px; height:20px; }
.test-note { margin:13px 0 0; padding:11px 12px; border-right: 3px solid #f4ad43; background:#fff8ea; color:#806221; border-radius:10px; font-size: 11px; line-height:1.85; }
.login-status { margin-top: 13px; min-height: 22px; color:var(--danger); font-size:12px; text-align:center; line-height:1.8; }
.dashboard-header { padding-bottom: 44px; }
.profile-line { display:flex; align-items:center; gap:12px; margin-top:18px; }
.avatar { width:48px; height:48px; border-radius:17px; background:rgba(255,255,255,.18); display:grid; place-items:center; border:1px solid rgba(255,255,255,.22); font-size:22px; }
.org-name { font-size:16px; font-weight:800; }
.ceo-name { color:#d5e5f6; font-size:12px; margin-top:5px; }
.dashboard-content { padding: 0 18px 28px; margin-top:-22px; flex:1; }
.license-strip {
  display:flex; align-items:center; gap:10px; background:#fff; box-shadow:0 9px 22px rgba(30,56,90,.10);
  border:1px solid #e5edf5; border-radius:17px; padding:12px 13px; margin-bottom:18px;
}
.status-dot { width:10px; height:10px; border-radius:50%; background:var(--success); box-shadow: 0 0 0 5px rgba(43,157,116,.12); }
.license-strip strong { font-size:12px; color:#32624d; }
.license-strip span { margin-right:auto; font-size:11px; color:var(--muted); }
.dashboard-grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:13px; }
.menu-card {
  min-height:154px; border-radius:23px; background:#fff; padding:17px 12px 15px; display:flex; align-items:center; flex-direction:column;
  justify-content:center; box-shadow:0 8px 20px rgba(25,49,81,.09); border:1px solid #edf2f7; position:relative; overflow:hidden;
}
.menu-card::after { content:""; position:absolute; inset:auto -28px -34px auto; width:88px; height:88px; border-radius:50%; background:rgba(44,141,199,.055); }
.menu-card:active { transform: scale(.985); }
.icon-orb { width:63px; height:63px; display:grid; place-items:center; border-radius: 22px; margin-bottom:12px; position:relative; z-index:1; }
.icon-orb svg { width: 37px; height:37px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
.menu-card:nth-child(1) .icon-orb, .menu-card:nth-child(4) .icon-orb { background:#e8f8f8; color:#158c92; }
.menu-card:nth-child(2) .icon-orb, .menu-card:nth-child(5) .icon-orb { background:#fff1f0; color:var(--coral); }
.menu-card:nth-child(3) .icon-orb, .menu-card:nth-child(6) .icon-orb { background:#edf4ff; color:#337abc; }
.menu-title { position:relative; z-index:1; text-align:center; font-size:13px; font-weight:800; line-height:1.65; color:#314561; }
.app-footer { padding: 11px 18px calc(13px + env(safe-area-inset-bottom)); text-align:center; font-size:11px; color:#7890aa; }
.log-controls { display:flex; justify-content:center; gap:8px; margin-top:10px; }
.tiny-link { color:#587697; background:transparent; text-decoration:underline; font-size:11px; padding:5px 7px; }
.dialog-root { position:fixed; inset:0; z-index:30; display:none; place-items:center; padding:24px; }
.dialog-root.show { display:grid; }
.dialog-backdrop { position:absolute; inset:0; background:rgba(10,27,50,.50); backdrop-filter: blur(3px); }
.dialog-card { position:relative; z-index:1; width:min(100%, 360px); background:#fff; border-radius:24px; padding:23px 19px 18px; box-shadow:0 24px 58px rgba(6,21,40,.32); text-align:center; animation: pop .2s ease-out; }
@keyframes pop { from{ transform:scale(.92); opacity:.3; } to { transform:scale(1); opacity:1; } }
.dialog-icon { width:43px; height:43px; display:grid; place-items:center; margin:0 auto 10px; border-radius:15px; background:#fff0ef; color:var(--danger); font-size:23px; font-weight:900; }
.dialog-card h2 { margin:0 0 8px; font-size:17px; color:var(--navy); }
.dialog-card p { margin:0 0 17px; font-size:13px; color:#52657c; line-height:1.9; white-space:pre-line; }
.toast-root { position:fixed; z-index:40; bottom:24px; right:50%; transform:translateX(50%); width:min(calc(100% - 32px), 425px); pointer-events:none; display:grid; gap:8px; }
.toast { padding:12px 14px; border-radius:14px; background:#1f354f; color:#fff; box-shadow:0 11px 25px rgba(14,28,45,.28); font-size:12px; text-align:center; opacity:0; transform:translateY(10px); animation: toastIn .22s ease forwards, toastOut .22s ease 3.1s forwards; }
.toast.success { background:#187458; }
.toast.warn { background:#9b6c1a; }
@keyframes toastIn { to {opacity:1; transform:translateY(0)} }
@keyframes toastOut { to {opacity:0; transform:translateY(8px)} }
.hidden { display:none !important; }
@media (min-width: 461px) { body{ padding:18px 0; } .app-shell{ min-height: calc(100dvh - 36px); border-radius:30px; box-shadow:0 24px 70px rgba(25,49,81,.22); } .page{ min-height:calc(100dvh - 36px); } }


/* ---- ماژول مالی سمن ---- */
.finance-header { padding-bottom: 30px; }
.finance-content { padding: 18px; flex: 1; }
.finance-card { margin-top: 28px; }
.finance-mark { background: linear-gradient(145deg, #f29a52, #d45a45); }
.secure-note { display:flex; align-items:center; gap:8px; margin:0 0 16px; padding:11px 12px; border-radius:13px; font-size:11px; line-height:1.8; color:#43647d; background:#eef7ff; border:1px solid #d4e9f8; }
.secure-note svg { width:20px; height:20px; flex:0 0 auto; color:#2d83b6; }
.step-card, .finance-summary-card, .list-card, .save-box, .invalid-card { background:#fff; border:1px solid #e1eaf2; border-radius:22px; box-shadow:0 9px 24px rgba(26,49,79,.08); padding:17px; margin-bottom:14px; }
.step-title { display:flex; align-items:flex-start; gap:11px; }
.step-title h2, .list-card h2, .save-box h2, .finance-summary-card h2 { margin:0; font-size:16px; color:var(--navy); }
.step-title p, .list-card p, .save-box p, .finance-summary-card p { margin:6px 0 0; color:var(--muted); font-size:11px; line-height:1.85; }
.step-no { width:30px; height:30px; flex:0 0 auto; display:grid; place-items:center; border-radius:11px; background:#e9f3fb; color:#1d76a8; font-size:14px; font-weight:800; }
.date-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:15px; }
.date-grid .field { margin:0; }
.date-grid label { font-size:11px; margin-bottom:6px; }
.date-grid select { width:100%; height:44px; border:1.5px solid var(--border); outline:0; background:#fbfdff; border-radius:12px; padding:0 6px; color:#334962; font:inherit; font-size:11px; }
.date-grid select:focus { border-color:#4e9ed2; box-shadow:0 0 0 3px rgba(44,141,199,.12); }
.finance-upload { margin-top:16px; min-height:124px; border:1.5px dashed #8dbddd; border-radius:17px; background:#f7fbff; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:6px; color:#2b78a6; text-align:center; padding:14px; cursor:pointer; }
.finance-upload svg { width:34px; height:34px; }
.finance-upload strong { font-size:14px; }
.finance-upload span { color:#6e8ca4; font-size:10px; }
.finance-inline-note { margin-top:11px; font-size:10.5px; line-height:1.8; padding:9px 10px; color:#81631e; background:#fff8e9; border-radius:11px; border:1px solid #f0ddac; }
.analyze-card { text-align:center; }
.finance-status { min-height:20px; margin:11px 0 0; text-align:center; font-size:11px; line-height:1.8; color:#bd4d4c; }
.success-text { color:#19805d; }
.summary-top { display:flex; align-items:center; gap:12px; }
.summary-top > div:first-child { width:48px; height:48px; display:grid; place-items:center; color:#168b91; background:#e8f8f8; border-radius:17px; }
.summary-top svg { width:28px; height:28px; }
.summary-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:9px; margin:16px 0 11px; }
.summary-grid > div { padding:12px 9px; background:#f8fbfe; border-radius:14px; text-align:center; border:1px solid #e6eef5; }
.summary-grid .wide { grid-column:span 2; background:#eff8f4; border-color:#d8ecdf; }
.summary-grid strong { display:block; font-size:15px; color:#1d5e83; }
.summary-grid .wide strong { color:#217557; }
.summary-grid span { display:block; color:#71859b; font-size:10px; margin-top:5px; }
.summary-message { padding:10px 11px; background:#eff6fc; border-radius:12px; color:#385f7b !important; font-size:11px !important; }
.invalid-card { border-color:#f2d7d1; background:#fff8f7; }
.invalid-card strong { color:#ba554d; font-size:12px; }
.invalid-card p { margin:7px 0 0; color:#7d615e; font-size:10.5px; line-height:1.8; }
.list-head { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:12px; }
.list-head input { width:145px; min-height:38px; border:1px solid var(--border); border-radius:11px; padding:0 9px; outline:0; font:inherit; font-size:10px; background:#fbfdff; }
.list-head input:focus { border-color:#5aa1cf; }
.payment-table-wrap { overflow-x:auto; border:1px solid #e4edf5; border-radius:14px; }
.payment-table { width:100%; min-width:650px; border-collapse:collapse; font-size:10.5px; }
.payment-table th { color:#fff; background:#1d5589; font-weight:700; padding:10px 8px; white-space:nowrap; }
.payment-table td { padding:10px 8px; border-bottom:1px solid #edf2f6; text-align:center; color:#40566b; white-space:nowrap; }
.payment-table tbody tr:nth-child(even) td { background:#fbfdff; }
.payment-table td small { color:#7e91a2; }
.empty-row { padding:18px !important; color:#8b9aa8 !important; }
.pager { margin-top:12px; display:flex; justify-content:space-between; align-items:center; gap:8px; }
.pager span { font-size:10px; color:#70859b; text-align:center; }
.pager button:disabled { opacity:.45; cursor:not-allowed; }
.save-box { text-align:center; background:linear-gradient(145deg,#f9fcff,#eff7fc); }
.save-box h2 { margin-bottom:4px; }
@media (max-width:360px) { .date-grid { grid-template-columns:1fr; } .list-head { flex-direction:column; } .list-head input { width:100%; } }



/* ---- ماژول مالی سمن: پرونده ماهانه مددجوها ---- */
.month-rule-card,
.recent-months-card,
.selected-month-card,
.month-file-card {
  background:#fff;
  border:1px solid #dfeaf3;
  border-radius:18px;
  box-shadow:0 7px 17px rgba(26,62,91,.07);
  padding:14px;
  margin:0 0 14px;
}
.month-rule-card { border-right:4px solid #2c8dc7; background:#f7fbff; }
.month-rule-card strong { display:block; color:#17456f; font-size:13px; margin-bottom:6px; }
.month-rule-card p,
.month-file-card small { margin:0; color:#5e7688; font-size:11px; line-height:1.9; }
.recent-months-card h2 { font-size:14px; color:#294b70; margin:0 0 10px; }
.recent-month-list { display:grid; gap:8px; }
.recent-month-row {
  display:flex; align-items:center; justify-content:space-between; gap:10px; width:100%;
  padding:11px 12px; border-radius:12px; background:#f8fcff; border:1px solid #deebf4;
  color:#244e73; text-align:right;
}
.recent-month-row span { font-weight:800; font-size:12px; }
.recent-month-row small { color:#648096; font-size:10px; }
.empty-small { color:#7a91a1; font-size:11px; margin:0; }
.selected-month-card { display:flex; align-items:center; gap:11px; background:linear-gradient(145deg,#eef8ff,#f8fcff); }
.selected-month-card > div:first-child {
  width:46px; height:46px; display:grid; place-items:center; color:#fff;
  background:linear-gradient(145deg,#1b75a3,#185687); border-radius:15px;
}
.selected-month-card svg { width:25px; height:25px; }
.selected-month-card span,
.selected-month-card small { display:block; color:#6f8798; font-size:10px; margin-bottom:3px; }
.selected-month-card strong { display:block; color:#17486f; font-size:15px; margin-bottom:4px; }
.monthly-summary-card { border-top:4px solid #2d8dc1; }
.month-file-card { display:flex; flex-direction:column; gap:5px; background:#f3fbfa; border-color:#d5ebe7; }
.month-file-card strong { color:#216c69; font-size:12px; }
.month-file-card span { color:#2d516c; font-weight:800; font-size:12px; line-height:1.7; }
.approval-actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
.reject-button {
  min-height:46px; padding:0 13px; border-radius:14px; font-weight:800;
  background:#fff2f0; color:#bd4d47; border:1px solid #f1c6c1;
}
.reject-button:active { transform:scale(.99); }
.confirmed-box { border:1px solid #cfe8dd; background:#f3fbf7; }
.confirmed-box h2 { color:#247151; }
.beneficiary-status {
  display:inline-block; padding:4px 7px; border-radius:8px; font-size:9px; font-weight:800;
}
.beneficiary-status.pending { background:#fff7e8; color:#97671b; }
.beneficiary-status.confirmed { background:#eaf8f0; color:#267251; }
.org-file-label { display:block; margin-top:5px; color:#6c8394; font-size:9px; line-height:1.6; max-width:160px; }
@media (max-width:360px) { .approval-actions { grid-template-columns:1fr; } }




/* ---- آرشیو ثبت ماهانه مالی سمن ---- */
.month-archive-card {
  background:#fff;
  border:1px solid #dce8f1;
  border-radius:19px;
  padding:14px;
  margin:0 0 16px;
  box-shadow:0 8px 18px rgba(25,63,92,.08);
}
.archive-title { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:12px; }
.archive-title h2 { color:#214c72; font-size:14px; margin:0 0 5px; }
.archive-title p { color:#718799; font-size:10px; line-height:1.8; margin:0; }
.month-archive-scroll { overflow-x:auto; border:1px solid #e3ecf3; border-radius:15px; }
.month-archive-table { width:100%; min-width:790px; border-collapse:collapse; background:#fff; }
.month-archive-table th {
  background:#eef7fd; color:#46667e; font-size:10px; font-weight:800;
  padding:10px 8px; text-align:center; white-space:nowrap; border-bottom:1px solid #dae8f2;
}
.month-archive-table td {
  padding:11px 8px; text-align:center; color:#35566f; font-size:10px;
  border-bottom:1px solid #edf3f7; white-space:nowrap;
}
.month-archive-table tr:last-child td { border-bottom:0; }
.month-archive-table .archive-row { cursor:pointer; transition:.15s ease; }
.month-archive-table .archive-row:active { background:#f1f9ff; transform:scale(.997); }
.archive-status {
  display:inline-block; padding:5px 7px; border-radius:8px; font-size:9px; font-weight:800;
}
.archive-status.surplus { background:#eaf8f0; color:#25724f; }
.archive-status.deficit { background:#fff0ee; color:#bc4f49; }
.archive-footer-note { margin-top:10px; color:#7d94a4; font-size:9.5px; line-height:1.9; }
.archive-empty {
  padding:18px; text-align:center; color:#708899; background:#f8fcff;
  border-radius:13px; border:1px dashed #cbdde9; font-size:11px;
}

/* ---- حسابداری ماهانه سمن ---- */
.accounting-page .finance-content { padding-top:18px; }
.accounting-period-card {
  display:grid; grid-template-columns:1fr 1fr; gap:10px;
  margin-bottom:14px;
}
.period-box {
  background:#fff; border:1px solid #dfeaf3; border-radius:17px; padding:13px;
  box-shadow:0 7px 17px rgba(25,63,92,.07);
}
.period-box span { display:block; color:#71899a; font-size:10px; margin-bottom:5px; }
.period-box strong { display:block; color:#244d71; font-size:15px; }
.period-box.emphasized { grid-column:1 / -1; background:linear-gradient(145deg,#eef8ff,#f8fcff); border-color:#cfe4f1; }
.period-box.emphasized strong { color:#156492; font-size:17px; }
.accounting-bank-list { display:grid; gap:9px; }
.accounting-bank-row {
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  border:1px solid #dfebf1; border-radius:15px; padding:11px; background:#fbfeff;
}
.accounting-bank-info { min-width:0; display:flex; flex-direction:column; gap:3px; }
.accounting-bank-info strong { color:#224e74; font-size:12px; }
.accounting-bank-info span { color:#5f788b; font-size:10px; }
.accounting-bank-info small { color:#7f95a4; font-size:9px; direction:rtl; overflow-wrap:anywhere; }
.accounting-empty-bank {
  border:1.5px dashed #c9dce9; border-radius:14px; padding:16px; color:#617b90;
  display:flex; flex-direction:column; gap:8px; font-size:11px; line-height:1.8;
}
.accounting-empty-bank strong { color:#2d587c; }
.accounting-income-card .field { margin-bottom:16px; }
.fixed-expense-field {
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  background:#f1f6fb; border:1px solid #d9e7f0; border-radius:14px; padding:12px; margin-top:10px;
}
.fixed-expense-field span { display:block; color:#5d7588; font-size:10px; margin-bottom:5px; }
.fixed-expense-field strong { display:block; color:#2d5777; font-size:14px; }
.fixed-expense-field small { display:block; color:#8296a5; font-size:9px; margin-top:4px; }
.fixed-expense-field b { white-space:nowrap; background:#e3edf4; color:#547088; border-radius:8px; padding:5px 6px; font-size:9px; }
.carry-in-field { background:#f4fbf8; border-color:#d3eade; }
.carry-in-field b { background:#e0f1e8; color:#367457; }
.beneficiary-count-grid { display:grid; gap:10px; }
.beneficiary-count-grid .field { margin:0; }
.fixed-count-input {
  background:#eef5f8 !important;
  color:#315b75 !important;
  font-weight:800;
  cursor:not-allowed;
  border-color:#d4e4ed !important;
}
.auto-count-note {
  display:block;
  margin-top:6px;
  color:#758e9e;
  font-size:9px;
  line-height:1.7;
}
.calculate-card {
  background:#fff; border:1px solid #dfeaf3; border-radius:18px; padding:14px;
  box-shadow:0 7px 17px rgba(25,63,92,.07); margin-bottom:14px;
}
.accounting-result { margin-top:12px; border-radius:15px; padding:12px; display:grid; gap:8px; }
.accounting-result.neutral { background:#f4f8fb; color:#668092; }
.accounting-result.surplus { background:#edf9f3; border:1px solid #cce8d9; }
.accounting-result.deficit { background:#fff2f0; border:1px solid #f0cac5; }
.accounting-result > div { display:flex; align-items:center; justify-content:space-between; gap:10px; font-size:11px; }
.accounting-result > div span { color:#5b7385; }
.accounting-result > div strong { color:#1e4e73; font-size:12px; }
.accounting-result.surplus > div:last-of-type strong { color:#287a58; }
.accounting-result.deficit > div:last-of-type strong { color:#be4f49; }
.accounting-result p { margin:4px 0 0; font-size:10.5px; line-height:1.8; color:#506d80; }
.accounting-issue-box { border-top:4px solid #1f8190; }
.issued-report-card {
  background:linear-gradient(145deg,#effaf6,#f8fdfb); border:1px solid #d1e9db;
  border-radius:18px; padding:15px; margin-bottom:14px;
}
.issued-report-card h2 { color:#257151; font-size:14px; margin:0 0 9px; }
.issued-report-card p { color:#527263; font-size:11px; line-height:1.9; margin:5px 0; }
.issued-report-card strong { color:#1e6449; }
.issued-actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px; }
@media (max-width:360px) {
  .accounting-bank-row, .fixed-expense-field { align-items:flex-start; flex-direction:column; }
  .issued-actions { grid-template-columns:1fr; }
}



/* ---- خروجی برای پنل ادمین ---- */
.export-header { background:linear-gradient(145deg,#28496f 0%,#2b7592 100%); }
.export-content { padding-top:18px; }
.export-intro-card {
  display:flex; align-items:center; gap:12px; padding:14px; border-radius:18px;
  background:linear-gradient(145deg,#f0f9ff,#fafcff); border:1px solid #d8e8f3;
  box-shadow:0 8px 18px rgba(30,74,107,.08); margin-bottom:13px;
}
.export-intro-icon {

  border-radius:15px; color:#fff; background:linear-gradient(145deg,#256c99,#224d78);
}
.export-intro-icon svg { width:27px; height:27px; }
.export-intro-card h2 { margin:0 0 5px; color:#234f73; font-size:13px; }
.export-intro-card p { margin:0; color:#688194; font-size:10px; line-height:1.8; }
.export-stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.export-stat-grid > div {

.admin-export-card {

}
.admin-export-card-head { display:flex; align-items:flex-start; gap:10px; margin-bottom:12px; }
.export-icon-orb {

  border-radius:13px; background:#edf7fc; color:#246d96;
}
.export-icon-orb svg { width:22px; height:22px; }
.admin-export-card-head h2 { margin:0 0 4px; color:#294f70; font-size:13px; }
.admin-export-card-head p { margin:0; color:#718899; font-size:10px; line-height:1.8; }
.export-scope-note {
  border-radius:11px; background:#f1f7fb; padding:9px 10px; color:#5f7c91;

.export-scope-note.warning { background:#fff6ea; color:#9a7041; }
.admin-export-button { width:100%; min-height:48px; }
.export-field { margin:0 0 12px; }
.export-month-checkboxes {
  display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:0 0 12px;
}
.export-month-check {
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;

.export-month-check:has(input:checked) {

.export-month-check small { color:#8498a6; font-size:8.5px; }
.export-package-guide {
  background:#fbfdfd; border:1px dashed #c9dce9; border-radius:17px; padding:14px; margin:4px 0 14px;

.export-package-guide h2 { margin:0 0 8px; color:#375c75; font-size:12px; }
.export-package-guide p { margin:6px 0; color:#6b8292; font-size:10px; line-height:1.9; }
.export-package-guide strong { color:#315a78; }
@media (max-width:360px) {

.export-save-path-card .primary-button { width:100%; margin-top:12px; }




/* ---- هدر سازمانی سراسری و تم سه‌بعدی ---- */
:root {
  --gov-blue-1:#0d3762;
  --gov-blue-2:#133f74;
  --gov-blue-3:#24598b;
  --gov-silver:#e9eef4;
  --gov-gold:#e3c98f;
}
.gov-global-banner {
  position:relative;
  margin:12px 14px 14px;
  min-height:150px;
  border-radius:28px;
  overflow:hidden;
  background:
    linear-gradient(180deg, rgba(5,27,52,.15), rgba(3,18,39,.28)),
    linear-gradient(140deg, var(--gov-blue-1) 0%, var(--gov-blue-2) 48%, #0d2e58 100%);
  box-shadow:
    0 18px 34px rgba(9,40,71,.22),
    inset 0 1px 0 rgba(255,255,255,.18),
    inset 0 -14px 30px rgba(2,15,32,.16);
  border:1px solid rgba(255,255,255,.16);
}
.gov-global-banner::before {
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 12% 20%, rgba(255,255,255,.10), transparent 24%),
    radial-gradient(circle at 23% 62%, rgba(255,255,255,.05), transparent 18%),
    linear-gradient(180deg, rgba(255,255,255,.06), transparent 34%);
  pointer-events:none;
}
.gov-global-banner::after {
  content:"";
  position:absolute;
  right:-78px;
  top:-18px;
  width:47%;
  height:128%;
  background:
    radial-gradient(circle at 25% 18%, rgba(255,255,255,.46), transparent 10%),
    linear-gradient(180deg,#0f8858 0 33%, #ffffff 33% 66%, #c63235 66% 100%);
  border-radius:45% 0 0 55% / 18% 0 0 22%;
  transform:rotate(-4deg);
  box-shadow:
    inset 16px 0 24px rgba(255,255,255,.17),
    inset -24px 0 36px rgba(0,0,0,.16),
    -18px 8px 28px rgba(2,20,42,.24);
  opacity:.96;
}
.gov-flag-shine {
  position:absolute;
  right:10%;
  top:-2%;
  width:28%;
  height:108%;
  background:
    linear-gradient(100deg, transparent 10%, rgba(255,255,255,.36) 35%, transparent 63%),
    linear-gradient(84deg, transparent 8%, rgba(255,255,255,.18) 48%, transparent 86%);
  transform:skewX(-7deg) rotate(2deg);
  pointer-events:none;
  z-index:2;
  opacity:.95;
}
.gov-banner-bottom-wave {
  position:absolute;
  left:-5%;
  bottom:-18px;
  width:76%;
  height:52px;
  background:linear-gradient(180deg, rgba(255,255,255,.95), rgba(231,236,243,.98));
  border-radius:0 92% 0 0 / 0 100% 0 0;
  box-shadow:0 -3px 10px rgba(255,255,255,.25), 0 -9px 18px rgba(226,201,143,.24);
  z-index:1;
}
.gov-banner-bottom-wave::after {
  content:"";
  position:absolute;
  inset:auto 0 11px 0;
  height:4px;
  background:linear-gradient(90deg, rgba(255,255,255,0), rgba(227,201,143,.95), rgba(255,255,255,0));
}
.gov-banner-content {
  position:relative;
  z-index:3;
  min-height:150px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px 38% 24px 26px;
  text-align:center;
}
.gov-banner-copy {
  color:#fff;
  text-shadow:0 4px 10px rgba(0,0,0,.34);
}
.gov-banner-copy .gov-topline {
  display:block;
  font-size:12px;
  line-height:1.4;
  opacity:.95;
  margin-bottom:5px;
}
.gov-banner-copy .gov-title-main {
  display:block;
  font-size:23px;
  font-weight:900;
  line-height:1.2;
  margin-bottom:6px;
}
.gov-banner-copy .gov-divider {
  width:180px;
  max-width:75%;
  height:2px;
  background:linear-gradient(90deg, transparent, rgba(227,201,143,.95), transparent);
  margin:8px auto 10px;
  position:relative;
}
.gov-banner-copy .gov-divider::after {
  content:"◆";
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-52%);
  font-size:10px;
  color:#ead39d;
  text-shadow:none;
}
.gov-banner-copy .gov-subtitle {
  display:block;
  font-size:20px;
  font-weight:800;
  line-height:1.28;
  margin-bottom:6px;
}
.gov-banner-copy .gov-subtitle.gov-county {
  font-size:25px; /* بزرگ‌تر از استانداری */
  font-weight:900;
}
.page.has-gov-header .finance-content,
.page.has-gov-header .center-page,
.page.has-gov-header .dashboard-content {
  padding-top:6px;
}
.page.has-gov-header .app-header {
  margin-bottom:0;
  border-bottom-left-radius:18px;
  border-bottom-right-radius:18px;
  box-shadow:0 10px 22px rgba(22,55,86,.14);
}
.dashboard-grid .menu-card,
.finance-card,
.step-card,
.admin-export-card,
.settings-tile,
.org-form-card,
.archive-item,
.export-history-item {
  box-shadow:
    0 16px 28px rgba(19,52,81,.10),
    0 6px 12px rgba(19,52,81,.05),
    inset 0 1px 0 rgba(255,255,255,.75);
}
.dashboard-grid .menu-card {
  background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(246,250,253,.98));
  position:relative;
}
.dashboard-grid .menu-card::after {
  content:"";
  position:absolute;
  left:14px;
  right:14px;
  bottom:0;
  height:7px;
  border-radius:10px 10px 0 0;
  background:linear-gradient(90deg, rgba(35,95,136,.18), rgba(44,132,174,.70), rgba(35,95,136,.18));
}
@media (max-width:560px) {
  .gov-global-banner {
    min-height:136px;
    margin:10px 12px 12px;
    border-radius:24px;
  }
  .gov-global-banner::after { width:45%; right:-70px; top:-10px; }
  .gov-banner-content {
    min-height:136px;
    padding:16px 37% 20px 18px;
  }
  .gov-banner-copy .gov-topline { font-size:10.5px; }
  .gov-banner-copy .gov-title-main { font-size:20px; }
  .gov-banner-copy .gov-subtitle { font-size:17px; }
  .gov-banner-copy .gov-subtitle.gov-county { font-size:21px; }
  .gov-banner-copy .gov-divider { width:150px; }
}
@media (max-width:380px) {
  .gov-banner-content { padding-right:35%; }
  .gov-banner-copy .gov-title-main { font-size:18px; }
  .gov-banner-copy .gov-subtitle { font-size:15px; }
  .gov-banner-copy .gov-subtitle.gov-county { font-size:18px; }
}

/* ---- تنظیمات سیستم، بکاپ و بازیابی ---- */
.settings-header { background:linear-gradient(145deg,#334f77 0%,#527b97 100%); }
.settings-danger-header { background:linear-gradient(145deg,#7b3942 0%,#a35757 100%); }
.output-header { background:linear-gradient(145deg,#2f6276 0%,#438d96 100%); }
.settings-content { padding-top:18px; }
.settings-security-note,
.backup-info-card,
.import-warning-card,
.credentials-note {
  display:flex; align-items:center; gap:11px; border-radius:17px; padding:13px;
  border:1px solid #dae7ef; background:#f7fbfd; margin-bottom:13px;
}
.settings-security-note > div,
.backup-info-icon,
.import-warning-card > div,
.credentials-note > svg {
  width:42px; height:42px; display:grid; place-items:center; flex:0 0 auto;
  border-radius:13px; color:#fff; background:linear-gradient(145deg,#466d8b,#31516f);
}
.settings-security-note svg,
.backup-info-icon svg,
.import-warning-card svg,
.credentials-note svg { width:23px; height:23px; }
.settings-security-note p,
.import-warning-card p,
.credentials-note p { margin:0; color:#688294; font-size:10px; line-height:1.9; }
.backup-info-card h2 { margin:0 0 4px; color:#365c75; font-size:12px; }
.backup-info-card p { margin:0; color:#6d8798; font-size:10px; line-height:1.9; }
.settings-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.settings-tile {
  min-height:145px; display:flex; flex-direction:column; align-items:flex-start; justify-content:space-between;
  text-align:right; padding:13px; border:1px solid #dce8ef; border-radius:18px; background:#fff;
  box-shadow:0 6px 15px rgba(33,72,100,.06); color:#355b75;
}
.settings-tile:active { transform:scale(.985); }
.settings-tile-icon {
  width:39px; height:39px; display:grid; place-items:center; border-radius:13px;
  background:#edf6fb; color:#287498;
}
.settings-tile-icon svg { width:21px; height:21px; }
.settings-tile strong { display:block; color:#3b5f77; font-size:11px; line-height:1.7; }
.settings-tile small { display:block; color:#7d94a4; font-size:8.8px; line-height:1.8; margin-top:3px; }
.settings-tile > b { color:#7696aa; font-size:16px; font-weight:400; }
.settings-tile.danger { border-color:#f0d4d2; background:#fffdfd; }
.settings-tile.danger .settings-tile-icon { background:#fff0ef; color:#bd504a; }
.settings-footer-note {
  display:flex; flex-direction:column; gap:5px; margin-top:13px; padding:12px; border-radius:14px;
  border:1px dashed #cbdde8; background:#fbfdfe;
}
.settings-footer-note strong { color:#3e6279; font-size:10px; }
.settings-footer-note span { color:#758d9e; font-size:9px; line-height:1.8; }
.settings-gate-area { min-height:calc(100vh - 110px); padding:22px 17px; }
.settings-gate-card {
  width:100%; max-width:410px; margin:auto; background:#fff; padding:20px 16px; border-radius:21px;
  border:1px solid #dce8ef; box-shadow:0 12px 30px rgba(31,65,91,.12); text-align:center;
}
.settings-gate-icon {
  width:56px; height:56px; display:grid; place-items:center; margin:0 auto 12px; border-radius:18px;
  background:linear-gradient(145deg,#315f85,#427f99); color:#fff;
}
.settings-gate-icon svg { width:29px; height:29px; }
.settings-gate-card h2 { margin:0 0 7px; color:#355c76; font-size:14px; }
.settings-gate-card > p { margin:0 0 16px; color:#72899a; font-size:10px; line-height:1.9; }
.settings-gate-card .primary-button { width:100%; }
.reset-warning-card {
  text-align:center; border-radius:18px; padding:18px 14px; border:1px solid #f0d1ce; background:#fff8f7; margin-bottom:13px;
}
.reset-warning-icon {
  width:47px; height:47px; display:grid; place-items:center; margin:0 auto 10px; border-radius:15px;
  color:#c04d47; background:#ffe7e4;
}
.reset-warning-icon svg { width:25px; height:25px; }
.reset-warning-card h2 { color:#924844; margin:0 0 7px; font-size:13px; }
.reset-warning-card p { color:#866b6a; margin:6px 0; font-size:10px; line-height:1.9; }
.settings-confirm-card {
  padding:14px; border-radius:18px; background:#fff; border:1px solid #dfe9f0;
  box-shadow:0 7px 17px rgba(25,63,92,.06);
}
.settings-confirm-card > label:not(.settings-check-row),
.settings-confirm-card .field label { display:block; margin-bottom:7px; color:#496a7e; font-size:10.5px; font-weight:800; }
.settings-confirm-card > input,
.settings-confirm-card .field input {
  width:100%; min-height:48px; border:1.5px solid #d9e7f0; border-radius:13px; padding:0 10px;
  background:#fbfdff; color:#335a73; font:inherit; font-size:11px; outline:0;

.settings-confirm-card > input:focus,
.settings-confirm-card .field input:focus { border-color:#4e9ed2; box-shadow:0 0 0 3px rgba(44,141,199,.12); }
.settings-confirm-card > small { display:block; margin:7px 0 12px; color:#7b93a3; font-size:9px; line-height:1.8; }
.settings-confirm-card .primary-button,
.settings-confirm-card .danger-button { width:100%; margin-top:12px; }
.danger-button {
  min-height:48px; border-radius:14px; background:#b84f4b; color:#fff; font:inherit; font-weight:800;
}
.danger-button:disabled { opacity:.52; cursor:not-allowed; }
.import-select-button {
  width:100%; min-height:50px; display:flex; align-items:center; justify-content:center; gap:7px; font-size:10.5px;
}

/* =========================================================
   تم نهایی آبی سازمانی — موبایل‌محور، راست‌به‌چپ و سه‌بعدی
   ========================================================= */
:root {
  --navy:#0b3f73;
  --navy-dark:#082c53;
  --sky:#147dc2;
  --cyan:#21a1c5;
  --cream:#f3f8fc;
  --card:#ffffff;
  --ink:#17344e;
  --muted:#6c8295;
  --border:#d7e5ef;
  --success:#198461;
  --danger:#cc5252;
  --blue-soft:#e9f4fb;
  --blue-soft-2:#f4f9fd;
  --blue-mid:#0d5f9e;
  --shadow:0 16px 32px rgba(9,54,95,.13);
  --radius:22px;
}
html, body {
  direction:rtl;
  background:
    radial-gradient(circle at 0 0, rgba(54,150,210,.14), transparent 25%),
    radial-gradient(circle at 100% 8%, rgba(28,112,179,.12), transparent 30%),
    #eaf2f8;
  color:var(--ink);
}
body {
  align-items:stretch;
  justify-items:center;
  overscroll-behavior-y:contain;
}
.app-shell {
  width:min(100%, 480px);
  background:
    linear-gradient(180deg, rgba(246,251,255,.98), rgba(235,245,251,.98)),
    var(--cream);
  box-shadow:0 28px 80px rgba(7,45,80,.18);
  isolation:isolate;
}
.page {
  direction:rtl;
  background:
    radial-gradient(circle at 110% 10%, rgba(49,145,206,.09), transparent 30%),
    linear-gradient(180deg, #f8fcff 0%, #f0f7fb 100%);
}
button, input, textarea, select {
  direction:rtl;
}
input[type="number"], input[inputmode="numeric"], .money-input {
  direction:ltr;
  text-align:right;
}
.app-header {
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(circle at 86% -34%, rgba(122,208,255,.38), transparent 44%),
    linear-gradient(135deg, #0a2f59 0%, #0b4d84 52%, #1376a8 100%);
  border-radius:0 0 31px 31px;
  border-bottom:1px solid rgba(255,255,255,.24);
  box-shadow:
    0 14px 30px rgba(6,49,87,.26),
    inset 0 1px 0 rgba(255,255,255,.2),
    inset 0 -18px 26px rgba(3,28,55,.15);
}
.app-header::after {
  content:"";
  position:absolute;
  inset:auto -8% -28px auto;
  width:68%;
  height:88px;
  border-radius:50%;
  background:linear-gradient(180deg, rgba(255,255,255,.15), transparent);
  transform:rotate(-7deg);
  pointer-events:none;
}
.header-row, .profile-line {
  position:relative;
  z-index:1;
}
.header-title {
  font-weight:900;
  letter-spacing:-.2px;
}
.header-subtitle,
.ceo-name {
  color:#d9edff;
}
.header-icon-btn {
  background:linear-gradient(145deg, rgba(255,255,255,.22), rgba(255,255,255,.08));
  border-color:rgba(255,255,255,.25);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.25), 0 8px 16px rgba(3,26,51,.18);
}
.header-icon-btn:active,
.primary-button:active,
.secondary-button:active,
.ghost-button:active,
.menu-card:active,
.settings-tile:active {
  transform:translateY(2px) scale(.985);
}
.gov-global-banner {
  margin:10px 12px 15px;
  border-radius:25px;
  min-height:138px;
  box-shadow:
    0 18px 30px rgba(6,42,74,.2),
    0 4px 9px rgba(7,49,88,.09),
    inset 0 1px 0 rgba(255,255,255,.16);
}
.gov-banner-content {
  min-height:138px;
}
.dashboard-content,
.finance-content,
.org-content,
.settings-content,
.export-content {
  padding-right:14px !important;
  padding-left:14px !important;
}
.center-page {
  padding-right:14px;
  padding-left:14px;
}
.license-strip,
.step-card,
.finance-summary-card,
.list-card,
.save-box,
.invalid-card,
.month-rule-card,
.recent-months-card,
.selected-month-card,
.month-file-card,
.month-archive-card,
.admin-export-card,
.export-intro-card,
.export-stat-grid > div,
.export-package-guide,
.export-review-summary,
.export-file-name-card,
.export-checklist-card,
.export-save-path-card,
.org-form-card,
.activation-org-card,
.license-section,
.settings-security-note,
.settings-footer-note,
.settings-confirm-card,
.backup-info-card,
.import-warning-card,
.credentials-note,
.export-history-item,
.auth-card {
  border-color:rgba(105,158,195,.20) !important;
  background:
    linear-gradient(145deg, rgba(255,255,255,.98), rgba(245,250,254,.98)) !important;
  box-shadow:
    0 14px 28px rgba(16,67,105,.10),
    0 4px 10px rgba(20,77,117,.05),
    inset 0 1px 0 rgba(255,255,255,.88) !important;
}
.license-strip {
  border-radius:18px;
  background:linear-gradient(145deg,#ffffff,#eef7fc) !important;
}
.license-strip strong { color:#17634f; }
.status-dot {
  background:#1f9a70;
  box-shadow:0 0 0 5px rgba(31,154,112,.12), 0 0 12px rgba(31,154,112,.35);
}
.dashboard-grid {
  gap:12px;
}
.menu-card {
  min-height:145px;
  border-radius:22px;
  border-color:rgba(85,145,187,.20);
  background:
    linear-gradient(145deg, #ffffff 0%, #f0f7fc 100%) !important;
  box-shadow:
    0 15px 24px rgba(12,61,102,.12),
    0 5px 8px rgba(7,46,80,.05),
    inset 0 1px 0 rgba(255,255,255,.95) !important;
}
.menu-card::before {
  content:"";
  position:absolute;
  inset:1px;
  border-radius:21px;
  background:linear-gradient(140deg, rgba(255,255,255,.6), transparent 38%);
  pointer-events:none;
}
.menu-card::after {
  left:17px !important;
  right:17px !important;
  height:6px !important;

  background:linear-gradient(90deg, transparent, rgba(26,130,192,.72), transparent) !important;
}
.icon-orb {
  width:61px;

    0 10px 14px rgba(24,91,137,.16),

}
.menu-card:nth-child(n) .icon-orb {
  color:#116faf;
  background:linear-gradient(145deg,#e7f5ff,#cfeafa) !important;
}
.menu-card:nth-child(2n) .icon-orb {
  color:#0a609a;
  background:linear-gradient(145deg,#eef8ff,#d7effc) !important;
}
.menu-title {

  font-weight:900;
}
.primary-button,
.danger-button {

}
.primary-button {
  background:linear-gradient(135deg,#0a508b 0%, #0d78bb 58%, #20a0c8 100%) !important;
}
.secondary-button {
  background:linear-gradient(145deg,#eff8ff,#deeffa) !important;
  color:#145a8d !important;
  border-color:#c8e1f1 !important;
  box-shadow:0 7px 14px rgba(18,90,138,.10), inset 0 1px 0 rgba(255,255,255,.75);
}
.ghost-button {
  background:linear-gradient(145deg,#ffffff,#f0f7fb) !important;
  border-color:#d1e5f1 !important;
  color:#145d91 !important;
  box-shadow:0 6px 12px rgba(17,81,123,.08), inset 0 1px 0 rgba(255,255,255,.82);
}
.danger-button {
  background:linear-gradient(135deg,#a53f46,#cf5c57) !important;
}
.field label,
.step-title h2,
.list-card h2,
.save-box h2,
.finance-summary-card h2,
.month-archive-card h2,
.org-form-card h2,
.settings-confirm-card h2 {
  color:#19496f;
}
.field input,
.field select,
.field textarea,
.input-wrap input,
.date-grid select,
.list-head input,
.board-select,
.org-form-card textarea,
.settings-confirm-card > input,
.settings-confirm-card .field input {
  background:#fbfdff !important;
  border-color:#d4e5f0 !important;
  border-radius:14px !important;
  color:#264a66 !important;
  box-shadow:inset 0 1px 3px rgba(9,64,106,.03);
}
.field input:focus,
.field select:focus,
.field textarea:focus,
.input-wrap input:focus,
.date-grid select:focus,
.list-head input:focus,
.board-select:focus,
.org-form-card textarea:focus,
.settings-confirm-card > input:focus,
.settings-confirm-card .field input:focus {
  border-color:#2594d1 !important;
  box-shadow:0 0 0 3px rgba(36,146,209,.15), inset 0 1px 3px rgba(9,64,106,.03) !important;
}
.step-no,
.export-icon-orb,
.settings-tile-icon,
.activation-org-icon,
.backup-info-icon,
.export-history-icon {
  color:#fff !important;
  background:linear-gradient(145deg,#0c5d9b,#1689c4) !important;
  box-shadow:0 9px 14px rgba(12,104,164,.22), inset 0 1px 0 rgba(255,255,255,.26);
}
.settings-grid {
  gap:11px;
}
.settings-tile {
  min-height:138px;
  border-color:#d7e5ef !important;
  background:linear-gradient(145deg,#ffffff,#edf6fb) !important;
  box-shadow:
    0 13px 24px rgba(16,67,105,.10),
    inset 0 1px 0 rgba(255,255,255,.92) !important;
}
.settings-tile.danger {
  background:linear-gradient(145deg,#fff,#fff4f4) !important;
}
.settings-tile.danger .settings-tile-icon {
  background:linear-gradient(145deg,#b8484b,#da6760) !important;
}
.export-check-item.available .export-check-icon {
  background:#dff6eb;
  box-shadow:0 5px 8px rgba(27,135,91,.14);
}
.export-check-item.missing .export-check-icon {
  background:#ffe9e8;
  box-shadow:0 5px 8px rgba(183,70,65,.12);
}
.payment-table th,
.month-archive-table th {
  background:linear-gradient(135deg,#0b4e86,#167ab2) !important;
}
.payment-table-wrap,
.month-archive-scroll {
  border-color:#d5e4ef !important;
  box-shadow:inset 0 1px 2px rgba(5,49,84,.04);
}
.app-footer {
  color:#5f7d93;
}
.dialog-card {
  border:1px solid rgba(118,170,205,.28);
  background:linear-gradient(145deg,#fff,#f1f8fc);
}
.toast {
  background:linear-gradient(135deg,#0a3e70,#116fa4);
  box-shadow:0 13px 30px rgba(7,46,80,.28);
}
.toast.success { background:linear-gradient(135deg,#147353,#21946b); }
.toast.warn { background:linear-gradient(135deg,#9b6c1a,#c28b27); }
@media (max-width:480px) {
  body { display:block; }
  .app-shell { width:100%; min-height:100dvh; border-radius:0; box-shadow:none; }
  .page { min-height:100dvh; }
  .app-header { padding-right:16px; padding-left:16px; }
  .dashboard-content { margin-top:-18px; }
  .dashboard-grid { gap:10px; }
  .menu-card { min-height:135px; padding:14px 9px 13px; }
  .icon-orb { width:56px; height:56px; border-radius:18px; margin-bottom:9px; }
  .icon-orb svg { width:32px; height:32px; }
  .menu-title { font-size:11.5px; line-height:1.6; }
  .gov-global-banner { margin-right:10px; margin-left:10px; }
}
@media (max-width:340px) {
  .dashboard-grid { gap:8px; }
  .menu-card { min-height:123px; }
  .menu-title { font-size:10.5px; }
  .icon-orb { width:50px; height:50px; }
}

  function escapeHtml(input) {
    return String(input ?? "").replace(/[&<>"']/g, char => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
    }[char]));
  }

  function maskNationalCode(code) {
    const value = String(code || "");
    if (value.length < 4) return "••••";
    return `${value.slice(0, 3)}••••${value.slice(-2)}`;
  }

  function nowFa() {
    try { return new Intl.DateTimeFormat("fa-IR", { dateStyle: "short", timeStyle: "medium" }).format(new Date()); }
    catch (_) { return new Date().toLocaleString(); }
  }

  function readLogs() {
    try { return JSON.parse(localStorage.getItem("ngoPrototypeLogs") || "[]"); }
    catch (_) { return []; }
  }

  function saveLogs() {
    localStorage.setItem("ngoPrototypeLogs", JSON.stringify(state.logs.slice(-100)));
  }

  function logError(error, context = "خطای نامشخص") {
    const entry = {
      time: nowFa(),
      context,
      message: error instanceof Error ? error.message : String(error),
      stack: error && error.stack ? String(error.stack) : ""
    };
    state.logs.push(entry);
    saveLogs();
    console.error("[NGO Prototype]", entry);
  }

  function showToast(message, type = "") {
    const item = document.createElement("div");
    item.className = `toast ${type}`.trim();
    item.textContent = message;
    toastRoot.appendChild(item);
    window.setTimeout(() => item.remove(), 3450);
  }

  function showDialog(title, message, kind = "error") {
    document.getElementById("dialog-title").textContent = title;
    document.getElementById("dialog-message").textContent = message;
    const iconRoot = document.getElementById("dialog-icon");
    iconRoot.textContent = kind === "success" ? "✓" : "!";
    iconRoot.style.background = kind === "success" ? "#eaf9f1" : "#fff0ef";
    iconRoot.style.color = kind === "success" ? "#18805d" : "#d65252";
    dialogRoot.classList.add("show");
    dialogRoot.setAttribute("aria-hidden", "false");
  }

  function closeDialog() {
    dialogRoot.classList.remove("show");
    dialogRoot.setAttribute("aria-hidden", "true");
  }

  function stableStringify(value) {
    if (value === null || typeof value !== "object") return JSON.stringify(value);
    if (Array.isArray(value)) return "[" + value.map(stableStringify).join(",") + "]";
    return "{" + Object.keys(value).sort().map(key => JSON.stringify(key) + ":" + stableStringify(value[key])).join(",") + "}";
  }

  function bytesToBase64Url(bytes) {
    let binary = "";
    bytes.forEach(byte => { binary += String.fromCharCode(byte); });
    return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
  }

  async function hmacSha256Base64Url(secret, message) {
    if (!globalThis.crypto?.subtle) {
      throw new Error("مرورگر این دستگاه از رمزنگاری موردنیاز فایل فعال‌سازی پشتیبانی نمی‌کند. فایل را با Chrome به‌روز باز کنید.");
    }
    const key = await crypto.subtle.importKey(
      "raw",
      new TextEncoder().encode(secret),
      { name: "HMAC", hash: "SHA-256" },
      false,
      ["sign"]
    );
    const signature = await crypto.subtle.sign("HMAC", key, new TextEncoder().encode(message));
    return bytesToBase64Url(new Uint8Array(signature));
  }

  async function validateActivation(data) {
    if (!data || typeof data !== "object") throw new Error("فایل انتخاب‌شده JSON معتبر نیست.");

    for (const key of REQUIRED_TOP_LEVEL) {
      if (!(key in data)) throw new Error(`فیلد ضروری «${key}» در فایل اکتیو وجود ندارد.`);
    }
    if (data.type !== "JAVANROOD_CLIENT_ACTIVATION") {
      throw new Error("نوع فایل اکتیو برای این سامانه معتبر نیست.");
    }
    if (data.format !== ACTIVATION_FORMAT) {
      throw new Error("فرمت امضای فایل با فرمت مورد انتظار مطابقت ندارد.");
    }
    if (data.compatibleClient !== CLIENT_ID) {
      throw new Error(`فایل برای کلاینت ${CLIENT_ID} صادر نشده است.`);
    }
    if (data.payload?.version !== ACTIVATION_VERSION) {
      throw new Error("نسخه فایل فعال‌سازی با نسخه موردنیاز کلاینت مطابقت ندارد.");
    }
    if (data.payload.active !== true) {
      throw new Error("این لایسنس از سمت پنل ادمین غیرفعال شده است.");
    }
    for (const key of REQUIRED_PAYLOAD) {
      if (data.payload[key] === undefined || data.payload[key] === null || data.payload[key] === "") {
        throw new Error(`اطلاعات ضروری «${key}» در payload ناقص است.`);
      }
    }
    if (!/^\d{10}$/.test(String(data.payload.nationalCode))) {
      throw new Error("کد ملی مدیرعامل در فایل فعال‌سازی معتبر نیست.");
    }
    const normalizedPhone = normalizeMobile(data.payload.phone);
    if (!/^09\d{9}$/.test(normalizedPhone)) {
      throw new Error("شماره تماس مدیرعامل در فایل فعال‌سازی معتبر نیست. فایل را در پنل ادمین v5 دوباره صادر کنید.");
    }
    if (!String(data.signature).trim()) throw new Error("امضای فایل اکتیو وجود ندارد.");

    const unsigned = {
      type: data.type,
      format: data.format,
      compatibleClient: data.compatibleClient,
      payload: data.payload
    };
    const expectedSignature = await hmacSha256Base64Url(
      ACTIVATION_HMAC_SECRET,
      stableStringify(unsigned)
    );
    if (expectedSignature !== String(data.signature).trim()) {
      throw new Error("امضای فایل فعال‌سازی معتبر نیست یا فایل پس از صدور تغییر کرده است.");
    }
    return true;
  }

  async function sha256(value) {
    if (!globalThis.crypto?.subtle) {
      throw new Error("رمزنگاری مرورگر در دسترس نیست. لطفاً فایل را با Chrome به‌روز اجرا کنید.");
    }
    const buffer = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(value));
    return Array.from(new Uint8Array(buffer)).map(v => v.toString(16).padStart(2, "0")).join("");
  }

  async function detectPasswordHash(password, salt, expected) {
    // Several conventional patterns are tested only because the supplied license does not include
    // `passwordHashAlgorithm` or `passwordHashInputFormat`. Production must define both explicitly.
    const candidates = [
      password,
      `${salt}${password}`,
      `${password}${salt}`,
      `${salt}:${password}`,
      `${password}:${salt}`,
      `${salt}|${password}`,
      `${password}|${salt}`
    ];
    for (const candidate of candidates) {
      const digest = await sha256(candidate);
      if (digest === expected) return true;
    }
    return false;
  }

  const LOCAL_ACTIVATION_SETTING_ID = "ACTIVE_ACTIVATION_LICENSE_V1";

  function settingIdForBiometric(organizationId) {
    return `BIOMETRIC_LOGIN-${organizationId}`;
  }

  async function saveVerifiedActivationToDevice(data, fileLabel) {
    await putAppSetting({
      settingId: LOCAL_ACTIVATION_SETTING_ID,
      organizationId: data.payload.orgId,
      activationId: data.payload.activationId,
      verifiedNationalCode: normalizeNationalCode(data.payload.nationalCode),
      sourceFileName: String(fileLabel || "activation.json"),
      activation: data,
      verifiedAt: new Date().toISOString(),
      updatedAt: new Date().toISOString()
    });
  }

  async function restoreActivationFromDevice() {
    const record = await getAppSetting(LOCAL_ACTIVATION_SETTING_ID);
    if (!record?.activation) return false;

    await validateActivation(record.activation);
    const payloadCode = normalizeNationalCode(record.activation.payload?.nationalCode);
    if (!payloadCode || payloadCode !== normalizeNationalCode(record.verifiedNationalCode)) {
      throw new Error("اطلاعات فعال‌سازی ذخیره‌شده با کد ملی تأییدشده این دستگاه مطابقت ندارد.");
    }

    state.license = record.activation;
    state.pendingLicense = null;
    state.activationLoaded = true;
    state.activationVerified = true;
    state.activationSourceFileName = record.sourceFileName || "فایل فعال‌سازی ذخیره‌شده";
    return true;
  }

  function randomBytes(length = 32) {
    const bytes = new Uint8Array(length);
    crypto.getRandomValues(bytes);
    return bytes;
  }

  function base64UrlToBytes(value) {
    const normalized = String(value || "").replace(/-/g, "+").replace(/_/g, "/");
    const padded = normalized + "=".repeat((4 - normalized.length % 4) % 4);
    const binary = atob(padded);
    return Uint8Array.from(binary, char => char.charCodeAt(0));
  }

  const nativeCapacitorPluginCache = Object.create(null);

  function getNativeCapacitorPlugin(name) {
    try {
      const capacitor = globalThis.Capacitor;
      if (!capacitor?.isNativePlatform?.()) return null;
      if (nativeCapacitorPluginCache[name]) return nativeCapacitorPluginCache[name];
      const plugin = capacitor?.Plugins?.[name] ||
        (typeof capacitor?.registerPlugin === "function" ? capacitor.registerPlugin(name) : null);
      if (plugin) nativeCapacitorPluginCache[name] = plugin;
      return plugin || null;
    } catch (_) {
      return null;
    }
  }

  function nativeBiometricPlugin() {
    return getNativeCapacitorPlugin("BiometricAuth");
  }

  function biometricWebAuthnAvailable() {
    return Boolean(
      globalThis.isSecureContext &&
      globalThis.PublicKeyCredential &&
      navigator.credentials &&
      typeof navigator.credentials.create === "function" &&
      typeof navigator.credentials.get === "function"
    );
  }

  async function biometricAuthAvailable() {
    const nativePlugin = nativeBiometricPlugin();
    if (nativePlugin) {
      try {
        const result = await nativePlugin.isAvailable();
        return Boolean(result?.available);
      } catch (_) {
        return false;
      }
    }
    return biometricWebAuthnAvailable();
  }

  async function getBiometricRecord(organizationId = state.license?.payload?.orgId) {
    if (!organizationId) return null;
    return getAppSetting(settingIdForBiometric(organizationId));
  }

  async function removeActivationFromThisDevice() {
    const payload = state.license?.payload;
    const organizationId = payload?.orgId || "";

    // فقط داده‌های احراز هویت محلی و بایومتریک پاک می‌شوند.
    // اطلاعات مالی و عملیاتی سمن در این مرحله حذف نمی‌شوند.
    await deleteAppSetting(LOCAL_ACTIVATION_SETTING_ID);
    if (organizationId) {
      await deleteAppSetting(settingIdForBiometric(organizationId));
      await deleteAppSetting(settingIdForCredentials(organizationId));
    }

    state.license = null;
    state.pendingLicense = null;
    state.activationLoaded = false;
    state.activationVerified = false;
    state.activationSourceFileName = "";
  }

  async function enableBiometricForThisDevice() {
    if (!state.license?.payload?.orgId) throw new Error("ابتدا فعال‌سازی این دستگاه را تکمیل کنید.");

    const payload = state.license.payload;
    const nativePlugin = nativeBiometricPlugin();
    if (nativePlugin) {
      const availability = await nativePlugin.isAvailable();
      if (!availability?.available) {
        throw new Error("اثر انگشت یا قفل امن دستگاه فعال نیست.");
      }
      await nativePlugin.authenticate({
        title: "فعال‌سازی ورود امن",
        subtitle: "برای ثبت ورود امن این دستگاه، هویت خود را تأیید کنید."
      });
      await putAppSetting({
        settingId: settingIdForBiometric(payload.orgId),
        organizationId: payload.orgId,
        credentialId: "NATIVE_BIOMETRIC",
        registeredAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        mode: "NATIVE_BIOMETRIC"
      });
      return;
    }

    if (!biometricWebAuthnAvailable()) {
      throw new Error("اثر انگشت در این دستگاه یا شیوه اجرا در دسترس نیست.");
    }

    const credential = await navigator.credentials.create({
      publicKey: {
        challenge: randomBytes(),
        rp: { name: "سامانه مدیریت سمن‌ها و NGOها" },
        user: {
          id: new TextEncoder().encode(`${payload.orgId}:${payload.userId}`),
          name: payload.username,
          displayName: payload.ceoFullName
        },
        pubKeyCredParams: [
          { type: "public-key", alg: -7 },
          { type: "public-key", alg: -257 }
        ],
        authenticatorSelection: {
          authenticatorAttachment: "platform",
          userVerification: "required",
          residentKey: "preferred"
        },
        timeout: 60000,
        attestation: "none"
      }
    });

    if (!credential?.rawId) throw new Error("ثبت اثر انگشت در این دستگاه تکمیل نشد.");

    await putAppSetting({
      settingId: settingIdForBiometric(payload.orgId),
      organizationId: payload.orgId,
      credentialId: bytesToBase64Url(new Uint8Array(credential.rawId)),
      registeredAt: new Date().toISOString(),
      updatedAt: new Date().toISOString(),
      mode: "WEBAUTHN_PLATFORM_BIOMETRIC"
    });
  }

  async function biometricLogin() {
    const payload = state.license?.payload;
    if (!payload) throw new Error("اطلاعات فعال‌سازی در دسترس نیست.");
    const biometric = await getBiometricRecord(payload.orgId);
    if (!biometric?.credentialId) throw new Error("اثر انگشت برای این دستگاه فعال نشده است.");

    const nativePlugin = nativeBiometricPlugin();
    if (nativePlugin && biometric.mode === "NATIVE_BIOMETRIC") {
      await nativePlugin.authenticate({
        title: "ورود به سامانه",
        subtitle: "اثر انگشت یا قفل امن دستگاه را تأیید کنید."
      });
      logError("ورود امن اندروید موفق بود.", "ورود مدیرعامل");
      renderDashboard();
      return;
    }

    if (!biometricWebAuthnAvailable()) {
      throw new Error("ورود اثر انگشت در این شیوه اجرا در دسترس نیست. با رمز عبور وارد شوید.");
    }

    const assertion = await navigator.credentials.get({
      publicKey: {
        challenge: randomBytes(),
        allowCredentials: [{
          type: "public-key",
          id: base64UrlToBytes(biometric.credentialId),
          transports: ["internal"]
        }],
        userVerification: "required",
        timeout: 60000
      }
    });

    if (!assertion) throw new Error("تأیید اثر انگشت انجام نشد.");
    logError("ورود با اثر انگشت موفق بود.", "ورود مدیرعامل");
    renderDashboard();
  }

  async function verifyAndLoginWithPassword(username, password) {
    if (!state.activationLoaded || !state.license || !state.activationVerified) {
      throw new Error("فعال‌سازی این دستگاه هنوز کامل نشده است.");
    }
    if (!username || !password) throw new Error("نام کاربری و رمز عبور را وارد کنید.");

    const credentialOverride = await getCredentialOverride(state.license.payload.orgId);
    const expectedUsername = credentialOverride?.username || state.license.payload.username;
    if (username !== expectedUsername) {
      throw new Error("نام کاربری واردشده با اطلاعات ورود این سمن مطابقت ندارد.");
    }

    const passwordOK = credentialOverride
      ? await verifyCredentialOverridePassword(password, credentialOverride)
      : await detectPasswordHash(
          password,
          state.license.payload.passwordSalt,
          state.license.payload.passwordHash
        );

    if (!passwordOK) {
      throw new Error("رمز عبور صحیح نیست.");
    }
  }

  function renderActivationScreen() {
    state.pendingLicense = null;
    state.activationLoaded = false;
    state.activationVerified = false;

    root.innerHTML = `

            </div>
          </div>

        <main class="center-page">
          <section class="auth-card activation-flow-card">
            <div class="brand-mark">${icon("shield")}</div>

            <p class="auth-desc">فایل فعال‌سازی فقط یک‌بار در این دستگاه ثبت می‌شود. برای جلوگیری از استفاده نادرست، کد ملی مدیرعامل با فایل اکتیو مطابقت داده خواهد شد.</p>

            <section class="activation-step-card">

  async function setLoadedLicense(data, fileLabel) {
    await validateActivation(data);

    state.license = null;
    state.activationLoaded = false;
    state.activationVerified = false;

    const display = document.getElementById("file-name");
    display.innerHTML = `<strong>فایل فعال‌سازی امضاشده پذیرفته شد.</strong><br>
      سمن: ${escapeHtml(data.payload.organizationName)}<br>

    const codeInput = document.getElementById("activation-national-code");

    confirmButton.disabled = false;

  function bindInitialActivationScreen() {
    document.getElementById("dialog-confirm").onclick = closeDialog;
    document.querySelector("[data-close-dialog]").onclick = closeDialog;
    { const el = document.getElementById("error-log-header"); if (el) el.onclick = downloadLogs; }

    const input = document.getElementById("activation-input");
    input.addEventListener("change", async event => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      try {
        const raw = await file.text();
        const parsed = JSON.parse(raw);
        await setLoadedLicense(parsed, file.name);
      } catch (error) {
        logError(error, "خواندن فایل اکتیو");
        showDialog("خطا در فایل فعال‌سازی", error.message || "فایل انتخاب‌شده قابل خواندن نیست.");
      } finally {
        input.value = "";
      }
    });

    document.getElementById("confirm-activation").addEventListener("click", async () => {
      const status = document.getElementById("activation-status");
      const button = document.getElementById("confirm-activation");
      try {
        if (!state.pendingLicense) throw new Error("ابتدا فایل اکتیو را انتخاب کنید.");
        const enteredCode = normalizeNationalCode(document.getElementById("activation-national-code").value);
        const expectedCode = normalizeNationalCode(state.pendingLicense.payload.nationalCode);
        if (!/^\d{10}$/.test(enteredCode)) throw new Error("کد ملی باید ۱۰ رقم باشد.");
        if (enteredCode !== expectedCode) throw new Error("کد ملی واردشده با کد ملی مدیرعامل در فایل اکتیو مطابقت ندارد.");

        button.disabled = true;
        status.textContent = "در حال ذخیره فعال‌سازی روی این دستگاه…";
        await saveVerifiedActivationToDevice(state.pendingLicense, "activation.json");

        state.license = state.pendingLicense;
        state.pendingLicense = null;
        state.activationLoaded = true;
        state.activationVerified = true;
        state.activationSourceFileName = "activation.json";

        showToast("فعال‌سازی با کد ملی تأیید و ذخیره شد.", "success");
        renderSavedLoginScreen();
      } catch (error) {
        logError(error, "تأیید کد ملی و فعال‌سازی");
        status.textContent = error.message || "فعال‌سازی انجام نشد.";
        button.disabled = false;
      }
    });
  }

    const button = document.getElementById("biometric-action");
    const help = document.getElementById("biometric-help");
    if (!button || !help) return;

    const biometric = await getBiometricRecord();
    if (!(await biometricAuthAvailable())) {
      help.textContent = "اثر انگشت یا قفل امن دستگاه در دسترس نیست. ورود با رمز عبور فعال است.";
      button.textContent = "در این نسخه در دسترس نیست";
      button.disabled = true;
      return;

      help.textContent = "اثر انگشت این دستگاه ثبت شده است.";
      button.textContent = "ورود با اثر انگشت";
      button.disabled = false;

        try {
          button.disabled = true;

  // -------------------------
  // ماژول مالی سمن — پرونده ماهانه مددجوها و تأیید پرداخت
  // -------------------------
  const FINANCE_DB = "ngo_finance_prototype_db";
  const FINANCE_DB_VERSION = 11;
  const JALALI_MONTHS = [
    "فروردین", "اردیبهشت", "خرداد", "تیر", "مرداد", "شهریور",
    "مهر", "آبان", "آذر", "دی", "بهمن", "اسفند"
  ];

  function latinDigits(value) {
    return String(value ?? "")
      .replace(/[۰-۹]/g, d => "۰۱۲۳۴۵۶۷۸۹".indexOf(d))
      .replace(/[٠-٩]/g, d => "٠١٢٣٤٥٦٧٨٩".indexOf(d));
  }

  function normalizeText(value) {
    return latinDigits(value)
      .replace(/ي/g, "ی").replace(/ك/g, "ک")
      .replace(/[\u200c\s\-_()\[\]{}:؛،,.\/\\]/g, "")
      .trim().toLowerCase();
  }

  function persianDigits(value) {
    return String(value ?? "").replace(/\d/g, d => "۰۱۲۳۴۵۶۷۸۹"[Number(d)]);
  }

  function formatAmount(value) {
    const amount = Number(value || 0);
    return `ریال ${persianDigits(amount.toLocaleString("en-US"))}`;
  }

  function formatMoneyInput(value) {
    const amount = normalizeAmount(value);
    return amount ? amount.toLocaleString("en-US") : "";
  }

  function jalaliToday() {
    try {
      const parts = new Intl.DateTimeFormat("fa-IR-u-ca-persian", {
        year: "numeric", month: "numeric", day: "numeric"
      }).formatToParts(new Date());
      const pick = type => latinDigits(parts.find(p => p.type === type)?.value || "");
      return { year: Number(pick("year")), month: Number(pick("month")), day: Number(pick("day")) };
    } catch (_) {
      return { year: 1405, month: 4, day: 4 };
    }
  }

  function financeDateMetaFromForm() {
    const year = Number(document.getElementById("finance-year")?.value);
    const month = Number(document.getElementById("finance-month")?.value);
    const day = Number(document.getElementById("finance-day")?.value);
    if (!year || !month || !day) throw new Error("تاریخ پرداخت را کامل انتخاب کنید.");
    const organizationId = state.license?.payload?.orgId || "";
    if (!organizationId) throw new Error("اطلاعات سازمان از فایل اکتیو قابل دریافت نیست.");
    const monthId = `${year}-${String(month).padStart(2, "0")}`;
    return {
      year,
      month,
      day,
      monthId,
      monthKey: `${organizationId}:${monthId}`,
      paymentDateJalali: `${year}/${String(month).padStart(2, "0")}/${String(day).padStart(2, "0")}`,
      monthLabel: `${JALALI_MONTHS[month - 1]} ${persianDigits(year)}`,
      organizationId
    };
  }

  function financeFileLabel(meta) {
    return `${state.license.payload.organizationName} — پرونده پرداخت مددجوها — ${meta.monthLabel}`;
  }

  function openFinanceDb() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(FINANCE_DB, FINANCE_DB_VERSION);

      request.onupgradeneeded = () => {
        const db = request.result;
        const upgradeTx = request.transaction;

        if (!db.objectStoreNames.contains("batches")) {
          const batches = db.createObjectStore("batches", { keyPath: "batchId" });
          batches.createIndex("fileHash", "fileHash", { unique: false });

        if (db.objectStoreNames.contains("payments")) {

          if (!payments.indexNames.contains("monthKey")) {
            payments.createIndex("monthKey", "monthKey", { unique: false });
          }
        }

        // حذف فیلد قدیمی «دریافت‌کننده / فروشنده» از همه هزینه‌های قبلی.
        if (db.objectStoreNames.contains("expenses")) {
          const expenses = upgradeTx.objectStore("expenses");
          const cursorRequest = expenses.openCursor();
          cursorRequest.onsuccess = event => {
            const cursor = event.target.result;
            if (!cursor) return;
            const row = cursor.value;
            if (Object.prototype.hasOwnProperty.call(row, "payee")) {
              delete row.payee;
              cursor.update(row);
            }
            cursor.continue();
          };
        }
      };

      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error || new Error("دیتابیس محلی باز نشد."));
    });
  }

  function idbRequest(request) {
    return new Promise((resolve, reject) => {
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error || new Error("خطا در دیتابیس محلی."));
    });
  }

  function transactionDone(tx, fallbackMessage) {
    return new Promise((resolve, reject) => {
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error || new Error(fallbackMessage));
      tx.onabort = () => reject(tx.error || new Error(fallbackMessage));
    });
  }

    const db = await openFinanceDb();
    try {
      const tx = db.transaction("monthlyFiles", "readonly");
      return await idbRequest(tx.objectStore("monthlyFiles").get(monthKey));
    } finally {
      db.close();
    }
  }

      const tx = db.transaction("payments", "readonly");
      const records = await idbRequest(tx.objectStore("payments").index("batchId").getAll(batchId));
      return (records || []).sort((a, b) => Number(a.rowNumber || 0) - Number(b.rowNumber || 0));
    } finally {
      db.close();
    }
  }
